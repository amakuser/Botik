# Example config. Copy to config.yaml and adjust.
# Secrets are loaded from .env using env var names below.

bybit:
  host: "api-demo.bybit.com"   # DEMO; main: api.bybit.com
  ws_public_host: "stream.bybit.com"   # public market data; testnet: stream-testnet.bybit.com
  api_key_env: "BYBIT_API_KEY"
  api_secret_key_env: "BYBIT_API_SECRET_KEY"
  # Legacy fallback variable:
  api_secret_env: "BYBIT_API_SECRET"
  rsa_private_key_path_env: "BYBIT_RSA_PRIVATE_KEY_PATH"

symbols:
  - "BTCUSDT"
  - "ETHUSDT"
  - "SOLUSDT"
ws_depth: 50

strategy:
  min_spread_ticks: 2
  replace_interval_ms: 5000
  order_ttl_sec: 60
  default_tick_size: 0.01

  # Spread scanner
  order_qty_base: 0.001
  entry_tick_offset: 1
  target_profit: 0.0002
  safety_buffer: 0.0001
  min_top_book_qty: 0.0

  # Execution behavior
  maker_only: true
  position_hold_timeout_sec: 180
  min_position_qty_base: 0.000001
  force_exit_enabled: true
  force_exit_time_in_force: "IOC"
  force_exit_cooldown_sec: 10

  inventory:
    max_net_base_pct: 10.0
    max_position_value_usdt: 500.0

risk:
  initial_equity_usdt: 10000.0
  max_total_exposure_pct_of_initial: 2.0
  max_symbol_exposure_pct: 1.0
  max_orders_per_minute: 30

fees:
  maker_rate: 0.001
  taker_rate: 0.001
  default_when_unknown: "taker"

telegram:
  token_env: "TELEGRAM_BOT_TOKEN"
  chat_id_env: "TELEGRAM_CHAT_ID"

start_paused: true
allow_panic_market_close: false

execution:
  mode: "live"   # live | paper
  paper_fill_on_cross: true

storage:
  path: "data/botik.db"
  metrics_interval_sec: 1
retention_days: 30
retention_max_db_size_gb: 50

logging:
  dir: "logs"
  max_bytes: 10485760
  backup_count: 5
