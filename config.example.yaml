# Example config. Copy to config.yaml and adjust.
# Secrets are loaded from .env using env var names below.

bybit:
  host: "api-demo.bybit.com"   # DEMO; main: api.bybit.com
  ws_public_host: "stream.bybit.com"   # public market data; testnet: stream-testnet.bybit.com
  market_category: "spot"  # spot | linear
  api_key_env: "BYBIT_API_KEY"
  api_secret_key_env: "BYBIT_API_SECRET_KEY"
  # Legacy fallback variable:
  api_secret_env: "BYBIT_API_SECRET"
  rsa_private_key_path_env: "BYBIT_RSA_PRIVATE_KEY_PATH"

symbols:
  - "BTCUSDT"
  - "ETHUSDT"
  - "SOLUSDT"
ws_depth: 50

strategy:
  runtime_strategy: "spread_maker"  # spread_maker | spike_reversal
  min_spread_ticks: 1
  min_spread_bps: 8
  replace_interval_ms: 5000
  order_ttl_sec: 60
  default_tick_size: 0.01

  # Spread scanner
  order_qty_base: 0.001
  entry_tick_offset: 1
  target_profit: 0.0001
  safety_buffer: 0.00005
  min_top_book_qty: 0.0

  # Execution behavior
  maker_only: true  # deprecated runtime switch (entries are always maker-only)
  position_hold_timeout_sec: 180
  min_position_qty_base: 0.000001
  force_exit_enabled: true
  force_exit_time_in_force: "IOC"
  force_exit_cooldown_sec: 10
  force_exit_dust_cooldown_sec: 300
  allow_taker_exit: true
  stop_loss_pct: 0.003
  take_profit_pct: 0.005
  pnl_exit_enabled: true
  fallback_stoploss_bps: 0
  fallback_breakeven_bps: 0
  fallback_trailing_bps: 0
  fallback_trailing_activation_bps: 0
  allow_partial_outcome: false
  scanner_enabled: true
  scanner_interval_sec: 3
  scanner_top_k: 80
  fast_reprice_on_send: true
  quote_max_book_age_ms: 1200
  execution_refresh_interval_sec: 8
  execution_refresh_max_symbols: 12
  execution_refresh_concurrency: 4
  reconciliation_enabled: true
  reconciliation_interval_sec: 120
  reconciliation_symbols_limit: 120
  auto_universe_enabled: true
  auto_universe_host: "api.bybit.com"
  auto_universe_quote: "USDT"
  auto_universe_exclude_st_tag_1: true
  auto_universe_size: 250
  auto_universe_min_symbols: 120
  auto_universe_refresh_sec: 180
  auto_universe_min_turnover_24h: 300000
  auto_universe_min_raw_spread_bps: 0
  auto_universe_min_top_book_notional: 0
  bandit_enabled: true
  bandit_epsilon: 0.05
  action_profiles:
    - profile_id: "safe"
      entry_tick_offset: 1
      order_qty_base: 0.001
      target_profit: 0.0001
      safety_buffer: 0.00005
      min_top_book_qty: 0.0
      stop_loss_pct: 0.003
      take_profit_pct: 0.005
      hold_timeout_sec: 180
      maker_only: true
    - profile_id: "aggr"
      entry_tick_offset: 1
      order_qty_base: 0.0015
      target_profit: 0.00012
      safety_buffer: 0.00006
      min_top_book_qty: 0.0
      stop_loss_pct: 0.0035
      take_profit_pct: 0.006
      hold_timeout_sec: 120
      maker_only: true

  # Pair admission bootstrap profile (balanced demo).
  spread_window_sec: 60
  trade_window_sec: 300
  vol_window_sec: 60
  min_hold_seconds: 15
  cooldown_seconds: 60
  order_notional_quote: 50
  bootstrap_fee_entry_bps: 2
  bootstrap_fee_exit_bps: 2
  safety_buffer_bps: 0.5
  target_edge_bps: 1
  maker_only_entry: true
  min_trades_per_min: 10
  max_p95_trade_gap_ms: 12000
  max_max_gap_ms: 30000
  depth_band_bps: 25
  min_depth_multiplier: 8
  max_total_slippage_bps: 4
  max_vol_to_spread_ratio: 1.2
  max_trade_silence_ms: 12000
  max_book_silence_ms: 5000
  spike_window_sec: 3
  spike_threshold_bps: 12
  spike_min_trades_per_min: 8
  spike_burst_enabled: true
  spike_burst_slices: 4
  spike_burst_qty_scale: 0.25
  spike_burst_tick_step: 1
  spike_profile_id: "spike"
  spike_reversal_reverse: true
  spike_reversal_taker: true
  spike_reversal_min_strength_bps: 12
  spike_reversal_entry_offset_ticks: 1
  spike_reversal_qty_scale: 1.0
  spike_reversal_max_symbols: 40
  spike_reversal_cooldown_sec: 2.0
  strict_pair_filter: true

  inventory:
    max_net_base_pct: 10.0
    max_position_value_usdt: 500.0

risk:
  initial_equity_usdt: 10000.0
  max_total_exposure_pct_of_initial: 2.0
  max_symbol_exposure_pct: 1.0
  max_orders_per_minute: 30

fees:
  maker_rate: 0.001
  taker_rate: 0.001
  default_when_unknown: "taker"

telegram:
  token_env: "TELEGRAM_BOT_TOKEN"
  chat_id_env: "TELEGRAM_CHAT_ID"

start_paused: true
allow_panic_market_close: false

execution:
  mode: "live"   # live | paper
  paper_fill_on_cross: true

ml:
  mode: "bootstrap"   # bootstrap | train | predict | online
  enabled: true
  run_interval_sec: 300
  model_dir: "data/models"
  train_limit_rows: 200000
  train_batch_size: 64
  min_closed_trades_to_train: 120
  min_fills_for_autocalibration: 20
  autocalibration_path: "data/ml/autocalibration.json"
  predict_top_k: 10

storage:
  path: "data/botik.db"
  metrics_interval_sec: 1
retention_days: 30
retention_max_db_size_gb: 50

logging:
  dir: "logs"
  max_bytes: 10485760
  backup_count: 5

data:
  # Таймфреймы для сбора исторических данных (backfill + seed).
  # Bybit поддерживает: "1","3","5","15","30","60","120","240","360","720","D","W","M"
  backfill_intervals:
    - "1"
    - "5"
    - "15"
    - "60"
    - "240"
    - "D"
    - "W"
