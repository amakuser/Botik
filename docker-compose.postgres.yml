services:
  postgres:
    image: postgres:16-alpine
    container_name: botik-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: botik
      POSTGRES_USER: botik
      POSTGRES_PASSWORD: botik_dev_password
    ports:
      - "54329:5432"
    volumes:
      - botik-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U botik -d botik"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

volumes:
  botik-postgres-data:
