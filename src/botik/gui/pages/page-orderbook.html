    <div class="page" id="page-orderbook">
      <div class="page-header">
        <div>
          <div class="page-title">Стакан ордеров</div>
          <div class="page-sub">Order book · Bybit REST · обновление каждые 20 сек</div>
        </div>
      </div>

      <!-- Symbol selector -->
      <div class="ob-controls card" style="display:flex;gap:12px;align-items:center;padding:14px 18px;margin-bottom:18px;">
        <label style="color:var(--text2);font-size:12px;white-space:nowrap;">Символ:</label>
        <select id="ob-symbol-select" style="background:var(--card2);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:13px;">
          <option value="BTCUSDT|linear">BTCUSDT (linear)</option>
          <option value="ETHUSDT|linear">ETHUSDT (linear)</option>
          <option value="SOLUSDT|linear">SOLUSDT (linear)</option>
          <option value="BTCUSDT|spot">BTCUSDT (spot)</option>
          <option value="ETHUSDT|spot">ETHUSDT (spot)</option>
        </select>
        <span id="ob-last-update" style="color:var(--text3);font-size:11px;margin-left:auto;">—</span>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
        <!-- Bids -->
        <div class="card" style="padding:0;overflow:hidden;">
          <div style="padding:10px 16px;background:rgba(0,212,100,0.08);border-bottom:1px solid var(--border);font-size:12px;color:var(--green);font-weight:600;letter-spacing:.5px;">
            ▲ ПОКУПКА (BIDS)
          </div>
          <div style="padding:8px 16px;display:grid;grid-template-columns:1fr 1fr 1fr;font-size:11px;color:var(--text3);border-bottom:1px solid var(--border);">
            <span>ЦЕНА</span><span style="text-align:right;">ОБЪЁМ</span><span style="text-align:right;">СУММА</span>
          </div>
          <div id="ob-bids" style="max-height:480px;overflow-y:auto;"></div>
        </div>

        <!-- Asks -->
        <div class="card" style="padding:0;overflow:hidden;">
          <div style="padding:10px 16px;background:rgba(255,60,80,0.08);border-bottom:1px solid var(--border);font-size:12px;color:var(--red);font-weight:600;letter-spacing:.5px;">
            ▼ ПРОДАЖА (ASKS)
          </div>
          <div style="padding:8px 16px;display:grid;grid-template-columns:1fr 1fr 1fr;font-size:11px;color:var(--text3);border-bottom:1px solid var(--border);">
            <span>ЦЕНА</span><span style="text-align:right;">ОБЪЁМ</span><span style="text-align:right;">СУММА</span>
          </div>
          <div id="ob-asks" style="max-height:480px;overflow-y:auto;"></div>
        </div>
      </div>
    </div><!-- /page-orderbook -->
