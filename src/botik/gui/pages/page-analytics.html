    <div class="page" id="page-analytics">
      <div class="page-header">
        <div>
          <div class="page-title">PnL Аналитика</div>
          <div class="page-sub">Equity curve · Drawdown · Win rate · История сделок</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <select class="select-field" id="analytics-scope" onchange="_loadAnalytics()" style="width:110px">
            <option value="all">Все</option>
            <option value="futures">Фьючерсы</option>
            <option value="spot">Спот</option>
          </select>
          <select class="select-field" id="analytics-days" onchange="_loadAnalytics()" style="width:90px">
            <option value="7">7 дней</option>
            <option value="30" selected>30 дней</option>
            <option value="90">90 дней</option>
            <option value="0">Всё время</option>
          </select>
        </div>
      </div>

      <!-- Сводные карточки -->
      <div class="grid-4 mb-14">
        <div class="card">
          <div class="metric-label">Итого PnL</div>
          <div class="metric-value" id="an-total-pnl">—</div>
          <div class="metric-change muted" id="an-today-pnl">Сегодня —</div>
        </div>
        <div class="card">
          <div class="metric-label">Win Rate</div>
          <div class="metric-value blue" id="an-win-rate">—</div>
          <div class="metric-change muted" id="an-trade-count">— сделок</div>
        </div>
        <div class="card">
          <div class="metric-label">Max Drawdown</div>
          <div class="metric-value red" id="an-drawdown">—</div>
          <div class="metric-change muted" id="an-avg-pnl">Avg —</div>
        </div>
        <div class="card">
          <div class="metric-label">Лучшая / Худшая</div>
          <div class="metric-value plain" id="an-best-worst">—</div>
          <div class="metric-change muted" id="an-scope-split">—</div>
        </div>
      </div>

      <!-- Equity curve -->
      <div class="card mb-14">
        <div class="section-title">Equity Curve (накопленный PnL)</div>
        <div id="an-chart-empty" style="padding:36px;text-align:center;color:var(--text3);font-size:13px">
          Нет данных по закрытым сделкам за выбранный период
        </div>
        <canvas id="an-equity-canvas" style="display:none;width:100%;height:200px"></canvas>
      </div>

      <!-- По типам + таблица сделок -->
      <div class="grid-21 mb-14">
        <div class="card">
          <div class="section-title">Последние сделки</div>
          <div id="an-trades-empty" style="padding:24px;text-align:center;color:var(--text3);font-size:13px">
            Нет данных
          </div>
          <table class="tbl" id="an-trades-table" style="display:none">
            <thead><tr>
              <th>Символ</th><th>Тип</th><th>PnL</th><th>Закрыта</th>
            </tr></thead>
            <tbody id="an-trades-tbody"></tbody>
          </table>
        </div>
        <div class="card" style="display:flex;flex-direction:column;gap:14px">
          <div class="section-title">По типам</div>
          <div id="an-by-scope"></div>
        </div>
      </div>
    </div>

    <!-- БЭКТЕСТ -->
