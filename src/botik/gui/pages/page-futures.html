    <div class="page" id="page-futures">
      <div class="page-header">
        <div class="page-title">Фьючерсы</div>
        <div class="page-sub">Futures training &amp; paper trading</div>
      </div>
      <div class="grid-3 mb-14">
        <div class="card">
          <div class="metric-label">Paper PnL</div>
          <div class="metric-value green" id="futures-pnl-val">—</div>
          <div class="metric-change muted" id="futures-pnl-sub">uPnL по открытым позициям</div>
        </div>
        <div class="card">
          <div class="metric-label">Позиций открыто</div>
          <div class="metric-value plain" id="futures-pos-val">—</div>
          <div class="metric-change muted" id="futures-pos-sub">Linear USDT · ожидание данных</div>
        </div>
        <div class="card">
          <div class="metric-label">Training статус</div>
          <div class="metric-value" id="ml-status-val" style="font-size:16px;color:var(--yellow)">—</div>
          <div class="metric-change muted" id="ml-status-sub">—</div>
        </div>
      </div>
      <div class="grid-21">
        <div class="card">
          <div class="section-title">Futures позиции (paper)</div>
          <div id="futures-empty-state" style="padding:40px;text-align:center;color:var(--text3);font-size:13px">
            Загрузка futures-позиций…
          </div>
          <table class="tbl" id="futures-table" style="display:none"></table>
        </div>
        <div class="card" style="display:flex;flex-direction:column;gap:12px">
          <div class="section-title">Управление</div>
          <button class="btn btn-accent" id="btn-train-start" style="width:100%;justify-content:center" onclick="apiStartTraining()">▶ Training</button>
          <button class="btn btn-red" id="btn-train-stop" style="width:100%;justify-content:center;display:none" onclick="apiStopTraining()">■ Стоп обучение</button>
          <button class="btn btn-ghost" style="width:100%;justify-content:center" onclick="apiStartPaper()">▶ Paper mode</button>
          <button class="btn btn-ghost" style="width:100%;justify-content:center">⬡ Результаты</button>
        </div>
      </div>
    </div>
