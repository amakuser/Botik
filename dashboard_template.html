<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Botik Dashboard — Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:         #03070F;
    --bg2:        #060D1C;
    --bg3:        #0A1628;
    --glass:      rgba(12, 22, 44, 0.55);
    --glass2:     rgba(18, 32, 60, 0.7);
    --border:     rgba(64, 120, 220, 0.18);
    --border2:    rgba(64, 120, 220, 0.35);
    --accent:     #3D8BFF;
    --accent2:    #5FA3FF;
    --teal:       #00D4C8;
    --teal2:      #00FFF5;
    --green:      #00E599;
    --red:        #FF4D6A;
    --yellow:     #FFB830;
    --purple:     #8B5CF6;
    --text:       #E8F0FF;
    --text2:      #8FA8D0;
    --text3:      #4A6080;
    --glow-blue:  0 0 30px rgba(61,139,255,0.25);
    --glow-teal:  0 0 30px rgba(0,212,200,0.2);
    --glow-green: 0 0 20px rgba(0,229,153,0.3);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .bg-mesh {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(ellipse 80% 60% at 10% 0%, rgba(30,60,160,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 90% 100%, rgba(0,180,160,0.12) 0%, transparent 55%),
      radial-gradient(ellipse 40% 40% at 50% 50%, rgba(20,40,100,0.08) 0%, transparent 70%);
  }
  .bg-grid {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(64,120,220,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(64,120,220,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 80%);
  }

  #particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.5; }

  .shell {
    position: relative; z-index: 1;
    display: grid;
    grid-template-rows: 52px 1fr;
    grid-template-columns: 220px 1fr;
    min-height: 100vh;
  }

  /* TOP BAR */
  .topbar {
    grid-column: 1 / -1;
    display: flex; align-items: center; gap: 16px;
    padding: 0 24px;
    background: rgba(6,13,28,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
  }
  .topbar-logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800; font-size: 17px;
    background: linear-gradient(135deg, var(--accent), var(--teal));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: 0.5px;
  }
  .topbar-logo span { opacity: 0.6; }
  .topbar-sep { width: 1px; height: 20px; background: var(--border2); margin: 0 4px; }
  .topbar-status {
    display: flex; align-items: center; gap: 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--green);
  }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    animation: pulse-dot 2s ease-in-out infinite;
  }
  .dot.green  { background: var(--green);  box-shadow: 0 0 8px var(--green); }
  .dot.yellow { background: var(--yellow); box-shadow: 0 0 8px var(--yellow); }
  .dot.accent { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); animation: pulse-dot 2s infinite; }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.5; transform: scale(0.85); }
  }
  .topbar-spacer { flex: 1; }
  .topbar-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; color: var(--text2);
    letter-spacing: 0.5px;
  }
  .topbar-badge {
    padding: 3px 10px; border-radius: 20px;
    font-size: 11px; font-weight: 500;
    background: rgba(0,229,153,0.12); color: var(--green);
    border: 1px solid rgba(0,229,153,0.25);
  }

  /* SIDEBAR */
  .sidebar {
    background: rgba(6,13,28,0.6);
    backdrop-filter: blur(16px);
    border-right: 1px solid var(--border);
    padding: 20px 0;
    display: flex; flex-direction: column; gap: 2px;
  }
  .sidebar-section {
    padding: 6px 16px 4px;
    font-size: 9.5px; font-weight: 600; letter-spacing: 1.2px;
    text-transform: uppercase; color: var(--text3);
  }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 16px; margin: 0 8px; border-radius: 8px;
    font-size: 13px; color: var(--text2);
    cursor: pointer; transition: all 0.18s ease;
    position: relative;
  }
  .nav-item:hover { background: rgba(61,139,255,0.08); color: var(--text); }
  .nav-item.active {
    background: rgba(61,139,255,0.12);
    color: var(--accent2);
  }
  .nav-item.active::before {
    content: '';
    position: absolute; left: 0; top: 20%; bottom: 20%;
    width: 2px; border-radius: 2px;
    background: linear-gradient(to bottom, var(--accent), var(--teal));
  }
  .nav-icon { font-size: 15px; width: 18px; text-align: center; }
  .nav-badge {
    margin-left: auto; padding: 1px 6px; border-radius: 10px;
    font-size: 10px; font-family: 'JetBrains Mono', monospace;
    background: rgba(255,75,106,0.2); color: var(--red);
  }
  .sidebar-footer {
    margin-top: auto;
    padding: 12px 16px 0;
    border-top: 1px solid var(--border);
    font-size: 11px; color: var(--text3);
    font-family: 'JetBrains Mono', monospace;
  }
  .sidebar-footer div { margin-bottom: 3px; }
  .sidebar-footer span { color: var(--text2); }

  /* MAIN */
  .main { padding: 24px; overflow-y: auto; }
  .main::-webkit-scrollbar { width: 5px; }
  .main::-webkit-scrollbar-track { background: transparent; }
  .main::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  /* PAGE HEADER */
  .page-header { margin-bottom: 22px; }
  .page-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700; font-size: 22px;
    background: linear-gradient(135deg, var(--text) 0%, var(--text2) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .page-sub { font-size: 12.5px; color: var(--text3); margin-top: 4px; }

  /* GLASS CARD */
  .card {
    background: var(--glass);
    backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px;
    position: relative; overflow: hidden;
    transition: border-color 0.25s, box-shadow 0.25s, transform 0.2s;
  }
  .card::before {
    content: '';
    position: absolute; inset: 0; border-radius: 14px;
    background: linear-gradient(135deg, rgba(61,139,255,0.04) 0%, transparent 60%);
    pointer-events: none;
  }
  .card:hover {
    border-color: var(--border2);
    box-shadow: var(--glow-blue);
    transform: translateY(-1px);
  }
  .card-glow-green { box-shadow: 0 0 0 1px rgba(0,229,153,0.3), var(--glow-green); }

  /* GRIDS */
  .grid-4  { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .grid-3  { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .grid-21 { display: grid; grid-template-columns: 2fr 1fr; gap: 14px; }
  .mb-14 { margin-bottom: 14px; }

  /* METRIC */
  .metric-label {
    font-size: 11px; color: var(--text3); letter-spacing: 0.5px;
    text-transform: uppercase; font-weight: 500; margin-bottom: 8px;
  }
  .metric-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 26px; font-weight: 700; line-height: 1.1;
  }
  .metric-value.green { color: var(--green); text-shadow: 0 0 20px rgba(0,229,153,0.3); }
  .metric-value.red   { color: var(--red);   text-shadow: 0 0 20px rgba(255,77,106,0.3); }
  .metric-value.blue  { color: var(--accent2); }
  .metric-value.teal  { color: var(--teal); }
  .metric-value.plain { color: var(--text); }
  .metric-change { font-size: 12px; margin-top: 5px; font-family: 'JetBrains Mono', monospace; }
  .metric-change.up   { color: var(--green); }
  .metric-change.muted { color: var(--text3); }
  .metric-icon { position: absolute; right: 16px; top: 16px; font-size: 22px; opacity: 0.25; }

  /* SECTION TITLE */
  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 13px; font-weight: 700;
    color: var(--text2); letter-spacing: 0.3px;
    margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(to right, var(--border2), transparent);
  }

  /* BUTTONS */
  .btn {
    padding: 8px 18px; border-radius: 8px; border: none;
    font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all 0.18s ease;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-accent {
    background: linear-gradient(135deg, var(--accent), #2A6FDD);
    color: #fff; box-shadow: 0 4px 16px rgba(61,139,255,0.3);
  }
  .btn-accent:hover { box-shadow: 0 4px 24px rgba(61,139,255,0.5); filter: brightness(1.1); }
  .btn-green {
    background: linear-gradient(135deg, #00C98A, #00A870);
    color: #fff; box-shadow: 0 4px 16px rgba(0,200,140,0.3);
  }
  .btn-green:hover { filter: brightness(1.1); box-shadow: 0 4px 24px rgba(0,200,140,0.45); }
  .btn-red {
    background: linear-gradient(135deg, #E8344A, #C42035);
    color: #fff; box-shadow: 0 4px 16px rgba(232,52,74,0.3);
  }
  .btn-red:hover { filter: brightness(1.1); }
  .btn-ghost {
    background: rgba(255,255,255,0.04); color: var(--text2);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { background: rgba(255,255,255,0.08); color: var(--text); }

  .ctrl-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

  .select-field {
    background: rgba(10,22,40,0.8); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 12px; font-size: 13px; font-family: 'Inter', sans-serif;
    outline: none; cursor: pointer; transition: border-color 0.18s;
  }
  .select-field:hover, .select-field:focus { border-color: var(--accent); }

  /* TABLE */
  .tbl { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  .tbl th {
    padding: 8px 12px; text-align: left;
    font-size: 10.5px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.8px;
    color: var(--text3); border-bottom: 1px solid var(--border);
  }
  .tbl td {
    padding: 10px 12px;
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    border-bottom: 1px solid rgba(64,120,220,0.06);
    color: var(--text2);
  }
  .tbl tr:last-child td { border-bottom: none; }
  .tbl tr:hover td { background: rgba(61,139,255,0.04); }
  .col-green { color: var(--green); }
  .col-red   { color: var(--red); }
  .col-blue  { color: var(--accent2); }
  .col-dim   { color: var(--text3); }

  /* STATUS ROW */
  .status-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 9px 0; border-bottom: 1px solid rgba(64,120,220,0.07);
    font-size: 13px;
  }
  .status-row:last-child { border-bottom: none; }
  .status-key { color: var(--text2); }
  .status-val { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text); }
  .status-val.ok   { color: var(--green); }
  .status-val.warn { color: var(--yellow); }

  /* LOG BOX */
  .log-box {
    background: rgba(3,7,15,0.85); border-radius: 8px;
    border: 1px solid var(--border);
    padding: 14px; font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px; line-height: 1.6; color: var(--text2);
    max-height: 280px; overflow-y: auto;
    display: flex; flex-direction: column; gap: 1px;
  }
  .log-box::-webkit-scrollbar { width: 4px; }
  .log-box::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  .log-line { display: flex; gap: 12px; }
  .log-ts  { color: var(--text3); white-space: nowrap; flex-shrink: 0; }
  .log-ch  { width: 70px; flex-shrink: 0; }
  .ch-spot    { color: var(--accent2); }
  .ch-futures { color: var(--teal); }
  .ch-ml      { color: var(--purple); }
  .ch-sys     { color: var(--text3); }
  .lm-ok   { color: #90EFC0; }
  .lm-warn { color: var(--yellow); }
  .lm-err  { color: var(--red); }
  .lm-norm { color: var(--text2); }

  /* CHART */
  .chart-area {
    position: relative; height: 140px;
    display: flex; align-items: flex-end; gap: 3px;
    padding: 12px 0 0;
  }
  .chart-bar {
    flex: 1; border-radius: 4px 4px 0 0;
    background: linear-gradient(to top, var(--accent), rgba(61,139,255,0.3));
    transition: height 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    min-height: 4px;
  }
  .chart-bar.bar-green {
    background: linear-gradient(to top, var(--green), rgba(0,229,153,0.3));
  }

  /* TICKER */
  .ticker {
    display: flex; gap: 24px; overflow: hidden;
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    padding: 10px 0; border-top: 1px solid var(--border); margin-top: 14px;
  }
  .ticker-item { display: flex; gap: 6px; align-items: center; white-space: nowrap; }
  .tick-sym { color: var(--text3); }
  .tick-price { color: var(--text); }
  .tick-up    { color: var(--green); }
  .tick-down  { color: var(--red); }
  .tick-stale { color: var(--text3); }
  .ticker-item.ticker-stale { opacity: 0.45; }

  /* ANALYTICS PAGE */
  .mini-stat {
    display: flex; flex-direction: column; gap: 2px;
    background: rgba(255,255,255,0.04); border-radius: 6px; padding: 6px 8px;
  }
  .mini-stat span { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .4px; }
  .mini-stat b    { font-size: 13px; font-family: 'JetBrains Mono', monospace; }
  .badge {
    display: inline-block; padding: 2px 6px; border-radius: 4px;
    font-size: 10px; font-family: 'JetBrains Mono', monospace;
    background: rgba(255,255,255,0.08); color: var(--text2);
  }

  /* MARKET PAGE — price cards */
  .market-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .price-card {
    background: var(--glass); backdrop-filter: blur(20px);
    border: 1px solid var(--border); border-radius: 14px; padding: 16px 18px;
    position: relative; overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
  }
  .price-card::before {
    content: ''; position: absolute; inset: 0; border-radius: 14px;
    background: linear-gradient(135deg, rgba(61,139,255,0.04) 0%, transparent 60%);
    pointer-events: none;
  }
  .price-card:hover { border-color: var(--border2); box-shadow: var(--glow-blue); transform: translateY(-1px); }
  .price-card.up  { border-color: rgba(0,229,153,0.28); }
  .price-card.down { border-color: rgba(255,77,106,0.22); }
  .price-card.stale { opacity: 0.45; }
  .price-card-sym  { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text3); margin-bottom:6px; }
  .price-card-value {
    font-family:'JetBrains Mono',monospace; font-size:20px; font-weight:700; letter-spacing:-0.5px;
    color:var(--text); margin-bottom:5px; transition: color 0.3s;
  }
  .price-card.up .price-card-value   { color: var(--green); }
  .price-card.down .price-card-value { color: var(--red); }
  .price-card-chg {
    font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:600;
    padding: 2px 7px; border-radius:5px; display:inline-block;
  }
  .price-card.up .price-card-chg   { background:rgba(0,229,153,0.12); color:var(--green); }
  .price-card.down .price-card-chg { background:rgba(255,77,106,0.12); color:var(--red); }
  .price-card.stale .price-card-chg { background: rgba(255,255,255,0.05); color:var(--text3); }
  .price-card-range { margin-top:10px; height:3px; background:var(--border); border-radius:2px; position:relative; overflow:hidden; }
  .price-card-range-fill { position:absolute; left:0; top:0; height:100%; border-radius:2px; transition:width 0.5s ease; background:var(--accent); }
  .price-card.up .price-card-range-fill   { background: var(--green); }
  .price-card.down .price-card-range-fill { background: var(--red); }
  .price-card-hl { display:flex; justify-content:space-between; font-size:10px; color:var(--text3); margin-top:4px; font-family:'JetBrains Mono',monospace; }
  @keyframes flash-up   { 0%{background:rgba(0,229,153,0.18)} 100%{background:transparent} }
  @keyframes flash-down { 0%{background:rgba(255,77,106,0.18)} 100%{background:transparent} }
  .price-card.flash-up   { animation: flash-up   0.55s ease-out forwards; }
  .price-card.flash-down { animation: flash-down 0.55s ease-out forwards; }
  .market-live-badge {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--green); padding: 3px 10px; border-radius: 20px;
    background: rgba(0,229,153,0.08); border: 1px solid rgba(0,229,153,0.2);
  }
  .market-live-badge .dot { width:6px; height:6px; border-radius:50%; background:var(--green); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }

  /* SUBTABS */
  .subtabs {
    display: flex; gap: 2px; margin-bottom: 16px;
    background: rgba(10,22,40,0.6);
    border: 1px solid var(--border); border-radius: 10px; padding: 4px;
    width: fit-content;
  }
  .subtab {
    padding: 6px 16px; border-radius: 7px;
    font-size: 12.5px; font-weight: 500; cursor: pointer;
    color: var(--text2); transition: all 0.18s;
  }
  .subtab.active {
    background: linear-gradient(135deg, var(--accent), #2A6FDD);
    color: #fff; box-shadow: 0 2px 12px rgba(61,139,255,0.35);
  }
  .subtab:not(.active):hover { color: var(--text); background: rgba(255,255,255,0.05); }

  /* MODELS */
  .model-card { display: flex; flex-direction: column; gap: 8px; cursor: pointer; transition: border-color .2s; }
  .model-card:hover { border-color: var(--accent2); }
  #model-detail-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:1000; justify-content:center; align-items:center; }
  #model-detail-overlay.open { display:flex; }
  #model-detail-box { background:var(--surface1); border:1px solid var(--border2); border-radius:12px; padding:28px; max-width:680px; width:90%; max-height:80vh; overflow-y:auto; position:relative; }
  .model-name {
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; color: var(--text);
  }
  .model-meta { font-size: 11px; color: var(--text3); }
  .progress-bar { height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
  .progress-fill {
    height: 100%; border-radius: 2px;
    background: linear-gradient(to right, var(--accent), var(--teal));
    transition: width 1.5s ease;
  }
  .model-stats { display: flex; gap: 14px; }
  .model-stat-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; }
  .model-stat-val { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 600; }

  /* TAGS */
  .tag {
    display: inline-flex; align-items: center;
    padding: 2px 8px; border-radius: 4px;
    font-size: 10px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase;
  }
  .tag-active  { background: rgba(0,229,153,0.15); color: var(--green); border: 1px solid rgba(0,229,153,0.25); }
  .tag-idle    { background: rgba(255,184,48,0.12); color: var(--yellow); border: 1px solid rgba(255,184,48,0.2); }
  .tag-loading { background: rgba(61,139,255,0.12); color: var(--accent2); border: 1px solid rgba(61,139,255,0.25); }
  .tag-risk    { background: rgba(255,77,106,0.12); color: var(--red); border: 1px solid rgba(255,77,106,0.22); }

  /* PAGES */
  .page { display: none; animation: fadeIn 0.25s ease; }
  .page.active { display: block; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  /* INPUT */
  .text-input {
    width: 100%; padding: 8px 12px;
    background: rgba(10,22,40,0.8); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px;
    font-family: 'JetBrains Mono', monospace; font-size: 13px; outline: none;
  }

<script>
/* ─── PARTICLES ─────────────────────────────────────────── */
(function() {
  var canvas = document.getElementById('particles');
  var ctx = canvas.getContext('2d');
  var W, H, particles = [];
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  resize(); window.addEventListener('resize', resize);
  for (var i = 0; i < 80; i++) {
    particles.push({
      x: Math.random()*W, y: Math.random()*H,
      vx: (Math.random()-0.5)*0.25, vy: (Math.random()-0.5)*0.25,
      r: Math.random()*1.2+0.3,
      alpha: Math.random()*0.4+0.1,
      color: Math.random() > 0.5 ? '61,139,255' : '0,212,200'
    });
  }
  function draw() {
    ctx.clearRect(0, 0, W, H);
    particles.forEach(function(p) {
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
      if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(' + p.color + ',' + p.alpha + ')';
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ─── CLOCK & UPTIME ────────────────────────────────────── */

  var m = String(Math.floor((uptimeSecs%3600)/60)).padStart(2,'0');
  var s = String(uptimeSecs%60).padStart(2,'0');
  document.getElementById('uptime').textContent = h+':'+m+':'+s;
}, 1000);

/* ─── LIVE TICKER ───────────────────────────────────────── */
function _fmtTickerPrice(price) {
  if (!price) return '—';
  var v = parseFloat(price);
  if (isNaN(v)) return String(price);
  if (v >= 10000) return v.toLocaleString('en-US', {maximumFractionDigits: 0});
  if (v >= 100)   return v.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
  if (v >= 1)     return v.toFixed(4);
  return v.toFixed(6);
}
function _fmtTickerChg(pct) {
  if (pct === null || pct === undefined || pct === '') return '—';
  var v = parseFloat(pct) * 100;
  return (v >= 0 ? '+' : '') + v.toFixed(2) + '%';
}
function _renderTickerRow(tickers) {
  var el = document.getElementById('ticker-row');
  if (!el) return;
  el.innerHTML = '';
  tickers.forEach(function(t) {
    var sym = (t.symbol || '').replace('USDT', '/USDT');
    var stale = !!t.stale;
    var up = !stale && t.change_pct !== null && parseFloat(t.change_pct) >= 0;
    var item = document.createElement('div');
    item.className = 'ticker-item' + (stale ? ' ticker-stale' : '');
    var symEl   = document.createElement('span'); symEl.className = 'tick-sym';   symEl.textContent = sym;
    var priceEl = document.createElement('span'); priceEl.className = 'tick-price'; priceEl.textContent = _fmtTickerPrice(t.price);
    var chgEl   = document.createElement('span'); chgEl.className = stale ? 'tick-stale' : (up ? 'tick-up' : 'tick-down');
    chgEl.textContent = stale ? '···' : _fmtTickerChg(t.change_pct);
    item.appendChild(symEl); item.appendChild(priceEl); item.appendChild(chgEl);
    el.appendChild(item);
  });
}
/* ─── MARKET PAGE CARDS ─────────────────────────────────── */
var _marketPrevPrices = {};
function _renderMarketPage(tickers) {
  var grid = document.getElementById('market-grid');
  if (!grid) return;
  tickers.forEach(function(t) {
    var sym = t.symbol || '';
    var stale = !!t.stale;
    var chgVal = t.change_pct !== null && t.change_pct !== undefined ? parseFloat(t.change_pct) : null;
    var dir = (!stale && chgVal !== null) ? (chgVal >= 0 ? 'up' : 'down') : '';

    var card = document.getElementById('mc-' + sym);
    if (!card) {
      card = document.createElement('div');
      card.id = 'mc-' + sym;
      card.className = 'price-card';
      card.innerHTML =
        '<div class="price-card-sym">' + sym.replace('USDT','') + '<span style="opacity:.5">/USDT</span></div>' +
        '<div class="price-card-value" id="mcv-' + sym + '">—</div>' +
        '<div class="price-card-chg" id="mcc-' + sym + '">—</div>' +
        '<div class="price-card-range"><div class="price-card-range-fill" id="mcr-' + sym + '" style="width:50%"></div></div>' +
        '<div class="price-card-hl"><span id="mcl-' + sym + '">Low —</span><span id="mch-' + sym + '">High —</span></div>';
      grid.appendChild(card);
    }

    // direction classes
    card.className = 'price-card' + (dir ? ' ' + dir : '') + (stale ? ' stale' : '');

    // flash on price change
    var prev = _marketPrevPrices[sym];
    var curPrice = t.price ? parseFloat(t.price) : null;
    if (!stale && curPrice !== null && prev !== undefined && curPrice !== prev) {
      var flashCls = curPrice > prev ? 'flash-up' : 'flash-down';
      card.classList.add(flashCls);
      setTimeout(function() { card.classList.remove('flash-up', 'flash-down'); }, 600);
    }
    if (curPrice !== null) _marketPrevPrices[sym] = curPrice;

    document.getElementById('mcv-' + sym).textContent = stale ? '···' : _fmtTickerPrice(t.price);
    document.getElementById('mcc-' + sym).textContent = stale ? '···' : _fmtTickerChg(t.change_pct);

    // high/low + range fill
    var low  = t.low  ? parseFloat(t.low)  : null;
    var high = t.high ? parseFloat(t.high) : null;
    if (low && high && curPrice !== null && high > low) {
      var pct = Math.round(((curPrice - low) / (high - low)) * 100);
      pct = Math.max(0, Math.min(100, pct));
      document.getElementById('mcr-' + sym).style.width = pct + '%';
      document.getElementById('mcl-' + sym).textContent = 'L ' + _fmtTickerPrice(String(low));
      document.getElementById('mch-' + sym).textContent = 'H ' + _fmtTickerPrice(String(high));
    }
  });
}

function _pollTickers() {
  var api = _getAPI();
  if (!api || typeof api.get_live_tickers !== 'function') { setTimeout(_pollTickers, 3000); return; }
  api.get_live_tickers().then(function(raw) {
    try {
      var d = JSON.parse(raw);
      if (d.tickers) {
        _renderTickerRow(d.tickers);
        _renderMarketPage(d.tickers);
      }
    } catch(e) {}
  }).catch(function(){});
  setTimeout(_pollTickers, 3000);
}

/* ─── ORDER BOOK ────────────────────────────────────────── */
var _obPollTimer = null;

function _fmtOBNum(v) {
  var n = parseFloat(v);
  if (isNaN(n)) return String(v);
  if (n >= 1e6) return (n/1e6).toFixed(2)+'M';
  if (n >= 1e3) return (n/1e3).toFixed(2)+'K';
  return n.toLocaleString('en-US', {maximumFractionDigits: 4});
}

function _renderOBSide(containerId, rows, side) {
  var el = document.getElementById(containerId);
  if (!el) return;
  el.textContent = '';
  if (!rows || rows.length === 0) {
    var empty = document.createElement('div');
    empty.style.cssText = 'padding:12px 16px;color:var(--text3);font-size:12px;';
    empty.textContent = 'Нет данных';
    el.appendChild(empty);
    return;
  }
  var maxQty = Math.max.apply(null, rows.map(function(r){ return parseFloat(r[1])||0; }));
  var barColor = side === 'bid' ? 'rgba(0,212,100,0.12)' : 'rgba(255,60,80,0.12)';
  var priceColor = side === 'bid' ? 'var(--green)' : 'var(--red)';
  rows.forEach(function(r) {
    var price = parseFloat(r[0]), qty = parseFloat(r[1]), total = price*qty;
    var pct = maxQty > 0 ? (qty/maxQty*100).toFixed(1) : 0;
    var row = document.createElement('div');
    row.style.cssText = 'display:grid;grid-template-columns:1fr 1fr 1fr;padding:5px 16px;position:relative;font-size:12px;';
    var bar = document.createElement('div');
    bar.style.cssText = 'position:absolute;right:0;top:0;bottom:0;width:'+pct+'%;background:'+barColor+';pointer-events:none;';
    var pEl = document.createElement('span');
    pEl.style.cssText = 'color:'+priceColor+';font-weight:600;z-index:1;';
    pEl.textContent = _fmtOBNum(price);
    var qEl = document.createElement('span');
    qEl.style.cssText = 'text-align:right;color:var(--text);z-index:1;';
    qEl.textContent = _fmtOBNum(qty);
    var tEl = document.createElement('span');
    tEl.style.cssText = 'text-align:right;color:var(--text2);z-index:1;';
    tEl.textContent = _fmtOBNum(total);
    row.appendChild(bar); row.appendChild(pEl); row.appendChild(qEl); row.appendChild(tEl);
    el.appendChild(row);
  });
}

function _pollOrderbook() {
  if (_obPollTimer) clearTimeout(_obPollTimer);
  var api = window.pywebview && window.pywebview.api;
  if (!api || typeof api.get_orderbook !== 'function') {
    _obPollTimer = setTimeout(_pollOrderbook, 3000); return;
  }
  var sel = document.getElementById('ob-symbol-select');
  if (!sel) { _obPollTimer = setTimeout(_pollOrderbook, 5000); return; }
  var parts = sel.value.split('|');
  var symbol = parts[0], category = parts[1] || 'linear';
  api.get_orderbook(symbol, category).then(function(raw) {
    try {
      var d = typeof raw === 'string' ? JSON.parse(raw) : raw;
      _renderOBSide('ob-bids', d.bids, 'bid');
      _renderOBSide('ob-asks', d.asks, 'ask');
      var upd = document.getElementById('ob-last-update');
      if (upd) upd.textContent = d.ts_ms ? 'обновлено ' + new Date(d.ts_ms).toLocaleTimeString() : 'нет данных';
    } catch(e) {}
    _obPollTimer = setTimeout(_pollOrderbook, 5000);
  }).catch(function() { _obPollTimer = setTimeout(_pollOrderbook, 5000); });
}

document.addEventListener('DOMContentLoaded', function() {
  var sel = document.getElementById('ob-symbol-select');
  if (sel) sel.addEventListener('change', function() { _pollOrderbook(); });
});

function buildTable(tableEl, headers, rows) {
  var thead = document.createElement('thead');
  var trh = document.createElement('tr');
  headers.forEach(function(h) {
    var th = document.createElement('th'); th.textContent = h; trh.appendChild(th);
  });
  thead.appendChild(trh);
  var tbody = document.createElement('tbody');
  rows.forEach(function(row) {
    var tr = document.createElement('tr');
    row.forEach(function(cell) {
      var td = document.createElement('td');
      if (cell.html !== undefined) {
        td.innerHTML = cell.html;
      } else if (cell.text !== undefined) {
        td.textContent = cell.text;
        if (cell.cls) td.className = cell.cls;
        if (cell.tag) {
          var sp = document.createElement('span');
          sp.className = 'tag ' + cell.tag;
          sp.textContent = cell.text;
          td.textContent = '';
          td.appendChild(sp);
        }
      }
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  tableEl.appendChild(thead);
  tableEl.appendChild(tbody);
}

var spotPositionHeaders = ['Символ','Base','Free','Locked','Avg entry','uPnL','Причина','Обновлено',''];
var spotOrderHeaders = ['Символ','Сторона','Тип','Цена','Qty','Filled','Статус','Обновлено'];
var spotHistoryHeaders = ['Символ','Сторона','Цена','Qty','Fee','Время'];
var _spotActiveView = 'positions';

var futuresHeaders = ['Символ','Сторона','Размер','Вход','Mark','Liq','uPnL','Защита','Обновлено',''];

var _modelsPayloadSignature = '';

/* ─── MODELS ────────────────────────────────────────────── */
function _modelsFormatPercent(value) {
  if (value === null || value === undefined || value === '') return '—';
  var num = Number(value);
  if (!isFinite(num)) return '—';
  if (Math.abs(num) <= 1) num = num * 100;
  return num.toFixed(1) + '%';
}

function _modelsFormatFixed(value, digits) {
  if (value === null || value === undefined || value === '') return '—';
  var num = Number(value);
  if (!isFinite(num)) return '—';
  return num.toFixed(digits);
}

function _modelsTagByRun(status, isTrained) {
  var normalized = String(status || '').trim().toLowerCase();
  if (isTrained || normalized === 'completed' || normalized === 'ready' || normalized === 'trained' || normalized === 'active') return 'tag-active';
  if (normalized === 'running' || normalized === 'training' || normalized === 'pending' || normalized === 'bootstrap' || normalized === 'started') return 'tag-loading';
  if (normalized === 'failed' || normalized === 'error' || normalized === 'rejected') return 'tag-risk';
  return 'tag-idle';
}

function _modelsStatusTone(status) {
  var normalized = String(status || '').trim().toLowerCase();
  if (normalized === 'active' || normalized === 'ready' || normalized === 'completed' || normalized === 'trained' || normalized === 'loaded') return 'ok';
  if (normalized === 'running' || normalized === 'training' || normalized === 'pending' || normalized === 'bootstrap' || normalized === 'missing' || normalized === 'failed') return 'warn';
  return '';
}

function _modelsFormatEpoch(card) {
  if (card.training_epoch === null || card.training_epoch === undefined) return '—';
  if (card.training_max_epochs === null || card.training_max_epochs === undefined) return String(card.training_epoch);
  return String(card.training_epoch) + '/' + String(card.training_max_epochs);
}

function _modelsCardMeta(card) {
  var parts = [];
  parts.push('Активная: ' + (card.has_active_model ? card.active_model : 'не выбрана'));
  if (card.model_version) parts.push('run: ' + card.model_version);
  if (card.updated_at && card.updated_at !== '-') parts.push('обновлено ' + _fmtTimeText(card.updated_at));
  return parts.join(' · ');
}

function _modelsCardStats(card) {
  var primaryLabel = 'Accuracy';
  var primaryValue = _modelsFormatPercent(card.accuracy);
  var primaryClass = (card.accuracy !== null && card.accuracy !== undefined && Number(card.accuracy) >= 0.6) ? 'col-green' : '';
  if (primaryValue === '—') {
    primaryLabel = (card.training_epoch !== null && card.training_epoch !== undefined) ? 'Epoch' : 'Win rate';
    primaryValue = (card.training_epoch !== null && card.training_epoch !== undefined) ? _modelsFormatEpoch(card) : _modelsFormatPercent(card.win_rate);
    primaryClass = (primaryLabel === 'Epoch') ? 'col-blue' : '';
  }
  return [
    { l: primaryLabel, v: primaryValue, c: primaryClass },
    { l: 'Sharpe', v: _modelsFormatFixed(card.sharpe_ratio, 2), c: 'col-blue' },
    { l: 'Trades', v: card.trade_count === null || card.trade_count === undefined ? '—' : String(card.trade_count), c: '' }
  ];
}

function _renderModelsCards(cards, allRuns) {

    var emptyCard = document.createElement('div');
    emptyCard.className = 'card';
    emptyCard.textContent = 'Нет данных по моделям';
    grid.appendChild(emptyCard);
    return;
  }

  cards.forEach(function(card) {
    var wrap = document.createElement('div'); wrap.className = 'card model-card';
    wrap.title = 'Нажмите для деталей';
    wrap.addEventListener('click', function() { _showModelDetail(card, allRuns); });

    var header = document.createElement('div');
    header.style.cssText = 'display:flex;justify-content:space-between;align-items:flex-start;gap:12px';
    var name = document.createElement('div'); name.className = 'model-name'; name.textContent = card.scope_label;
    var tag = document.createElement('span'); tag.className = 'tag ' + (card.tag_class || 'tag-idle'); tag.textContent = card.tag_text || 'IDLE';
    header.appendChild(name); header.appendChild(tag);

    var meta = document.createElement('div'); meta.className = 'model-meta'; meta.textContent = _modelsCardMeta(card);

    var stats = document.createElement('div'); stats.className = 'model-stats';
    _modelsCardStats(card).forEach(function(metric) {
      var st = document.createElement('div'); st.className = 'model-stat';
      var sl = document.createElement('div'); sl.className = 'model-stat-label'; sl.textContent = metric.l;
      var sv = document.createElement('div'); sv.className = 'model-stat-val ' + (metric.c || ''); sv.textContent = metric.v;
      st.appendChild(sl); st.appendChild(sv); stats.appendChild(st);
    });

    var progressWrap = document.createElement('div');
    var progressLabel = document.createElement('div');
    progressLabel.style.cssText = 'font-size:10px;color:var(--text3);margin-bottom:4px';
    progressLabel.textContent = card.progress_label || 'Статус';
    var bar = document.createElement('div'); bar.className = 'progress-bar';
    var fill = document.createElement('div'); fill.className = 'progress-fill';
    fill.style.width = Math.max(0, Math.min(100, Number(card.progress_pct || 0))) + '%';
    if (card.state === 'bootstrap') fill.style.cssText += ';background:linear-gradient(to right,var(--yellow),rgba(255,184,48,0.35))';
    if (card.state === 'missing') fill.style.cssText += ';background:linear-gradient(to right,var(--red),rgba(255,77,106,0.35))';
    bar.appendChild(fill);
    progressWrap.appendChild(progressLabel); progressWrap.appendChild(bar);

    wrap.appendChild(header);
    wrap.appendChild(meta);
    wrap.appendChild(stats);
    wrap.appendChild(progressWrap);

    [
      { key: 'Training', value: (card.training_status || card.metrics_status || card.state || '—').toUpperCase(), state: _modelsStatusTone(card.training_status || card.metrics_status || card.state) },
      { key: 'Режим', value: card.training_mode ? String(card.training_mode).toUpperCase() : '—', state: '' },
      { key: 'Checkpoint', value: card.checkpoint_name || '—', state: card.checkpoint_name ? 'ok' : 'warn' },
      { key: 'Manifest', value: String(card.manifest_status || 'missing').toUpperCase(), state: _modelsStatusTone(card.manifest_status) }
    ].forEach(function(row) {
      var line = document.createElement('div'); line.className = 'status-row';
      var key = document.createElement('span'); key.className = 'status-key'; key.textContent = row.key;
      var val = document.createElement('span'); val.className = 'status-val ' + (row.state || ''); val.textContent = row.value;
      line.appendChild(key); line.appendChild(val); wrap.appendChild(line);
    });

    if (card.latest_notes) {
      var note = document.createElement('div');
      note.className = 'model-meta';
      note.textContent = card.latest_notes;
      wrap.appendChild(note);

function _applyModelsRunsTable(runs, notes) {
  var tbl = document.getElementById('models-table');
  var empty = document.getElementById('models-empty-state');
  if (!tbl || !empty) return;

  if (!runs || !runs.length) {
    tbl.style.display = 'none';
    _clearEl(tbl);
    empty.style.display = '';
    empty.textContent = (notes && notes.length) ? notes.join(' ') : 'История training runs пока пуста';
    return;
  }

  empty.style.display = 'none';
  tbl.style.display = '';
  _clearEl(tbl);
  buildTable(tbl, modelRunHeaders, runs.map(function(run) {
    var statusText = String(run.status || '—').toUpperCase();
    return [
      { text: String(run.scope || '—').toUpperCase(), cls: 'col-blue' },
      { text: run.version || '—' },
      { text: String(run.mode || '—').toUpperCase(), cls: 'col-dim' },
      { text: statusText, tag: _modelsTagByRun(run.status, run.is_trained) },
      { text: run.epoch === null || run.epoch === undefined ? '—' : (run.max_epochs === null || run.max_epochs === undefined ? String(run.epoch) : String(run.epoch) + '/' + String(run.max_epochs)) },
      { text: _modelsFormatPercent(run.accuracy), cls: (run.accuracy !== null && run.accuracy !== undefined && Number(run.accuracy) >= 0.6) ? 'col-green' : '' },
      { text: _modelsFormatFixed(run.sharpe_ratio, 2), cls: 'col-blue' },
      { text: run.trade_count === null || run.trade_count === undefined ? '—' : String(run.trade_count) },
      { text: _fmtTimeText(run.updated_at), cls: 'col-dim' }
    ];
  }));
}

function _applyModelsSummary(payload) {
  var summary = payload.summary || {};
  var cards = payload.cards || [];
  var sources = payload.sources || [];

  var readyVal = document.getElementById('models-ready-val');
  if (readyVal) readyVal.textContent = String(summary.ready_scopes || 0) + '/' + String(summary.total_scopes || cards.length || 2);
  var readySub = document.getElementById('models-ready-sub');
  if (readySub) {
    readySub.textContent = cards.map(function(card) {
      return card.scope_label + ': ' + (card.tag_text || '—');
    }).join(' · ') || 'Ожидание данных';
  }

  var activeVal = document.getElementById('models-active-val');
  if (activeVal) activeVal.textContent = String(summary.active_declared_count || 0);
  var activeSub = document.getElementById('models-active-sub');
  if (activeSub) {
    activeSub.textContent = cards.map(function(card) {
      return card.scope + '=' + (card.has_active_model ? card.active_model : 'unknown');
    }).join(' · ') || 'active_models.yaml';
  }

  var runVal = document.getElementById('models-run-val');
  if (runVal) runVal.textContent = summary.latest_run_scope ? String(summary.latest_run_scope).toUpperCase() : '—';
  var runSub = document.getElementById('models-run-sub');
  if (runSub) {
    if (summary.latest_run_scope) {
      runSub.textContent = 'mode=' + String(summary.latest_run_mode || '—') + ' · status=' + String(summary.latest_run_status || '—');
    } else {
      runSub.textContent = 'История запусков пока не найдена';
    }
  }

  var sourceVal = document.getElementById('models-source-val');
  if (sourceVal) sourceVal.textContent = summary.db_available ? 'DB + YAML' : 'YAML';
  var sourceSub = document.getElementById('models-source-sub');
  if (sourceSub) {
    var sourceParts = sources.map(function(source) {
      return source.name + '=' + source.status;
    });
    if (summary.manifest_loaded_at && summary.manifest_loaded_at !== '-') sourceParts.push('loaded=' + _fmtTimeText(summary.manifest_loaded_at));
    sourceSub.textContent = sourceParts.join(' · ') || 'manifest / БД';
  }
}

function _applyModelsPayload(payload) {
  var signature = JSON.stringify(payload || {});
  if (_modelsPayloadSignature === signature) return;
  _modelsPayloadSignature = signature;
  _currentModelsPayload = payload;
  _applyModelsSummary(payload || {});
  _renderModelsCards((payload || {}).cards || [], (payload || {}).recent_runs || []);
  _applyModelsRunsTable((payload || {}).recent_runs || [], (payload || {}).notes || []);
}

function _renderPerModelCards(cards) {
  var grid = document.getElementById('models-per-model-grid');
  if (!grid) return;
  _clearEl(grid);
  if (!cards || !cards.length) return;
  cards.forEach(function(card) {
    var wrap = document.createElement('div'); wrap.className = 'card';
    wrap.style.cssText = 'display:flex;flex-direction:column;gap:8px';

    var header = document.createElement('div');
    header.style.cssText = 'display:flex;justify-content:space-between;align-items:flex-start;gap:8px';
    var nameEl = document.createElement('div'); nameEl.className = 'model-name';
    nameEl.textContent = (card.model_label || card.name || '?') + ' · ' + (card.scope_label || card.scope || '?');
    var tag = document.createElement('span'); tag.className = 'tag ' + (card.tag_class || 'tag-idle');
    tag.textContent = card.tag_text || 'IDLE';
    header.appendChild(nameEl); header.appendChild(tag);

    var desc = document.createElement('div'); desc.className = 'model-meta';
    desc.textContent = card.description || '';

    var meta = document.createElement('div'); meta.className = 'model-meta';
    var metaParts = [card.version || '—'];
    if (card.has_file) metaParts.push('✓ ' + (card.latest_file || 'file'));
    else metaParts.push('нет файла');
    meta.textContent = metaParts.join(' · ');

    var stats = document.createElement('div'); stats.className = 'model-stats';
    var accStat = document.createElement('div'); accStat.className = 'model-stat';
    var accLabel = document.createElement('div'); accLabel.className = 'model-stat-label'; accLabel.textContent = 'Accuracy';
    var accVal = document.createElement('div'); accVal.className = 'model-stat-val';
    if (card.accuracy !== null && card.accuracy !== undefined && card.accuracy !== '') {
      var pct = Number(card.accuracy);
      if (Math.abs(pct) <= 1) pct = pct * 100;
      accVal.textContent = pct.toFixed(1) + '%';
      if (pct >= 60) accVal.classList.add('col-green');
    } else {
      accVal.textContent = '—';
    }
    accStat.appendChild(accLabel); accStat.appendChild(accVal); stats.appendChild(accStat);

    wrap.appendChild(header);
    wrap.appendChild(desc);
    wrap.appendChild(meta);
    wrap.appendChild(stats);

    if (card.updated_at && card.updated_at !== '—') {
      var updated = document.createElement('div'); updated.className = 'model-meta';
      updated.textContent = 'обновлено ' + _fmtTimeText(card.updated_at);
      wrap.appendChild(updated);
    }
    grid.appendChild(wrap);
  });
}

function _renderMlLogs(logs) {
  var box = document.getElementById('ml-log-box');
  if (!box) return;
  var sig = JSON.stringify(logs);
  if (_mlLogSignature === sig) return;
  _mlLogSignature = sig;
  _clearEl(box);
  if (!logs || !logs.length) {
    var empty = document.createElement('div');
    empty.style.cssText = 'color:var(--text3);font-size:12px;padding:8px';
    empty.textContent = 'ML логи отсутствуют';
    box.appendChild(empty);
    return;
  }
  logs.forEach(function(entry) {
    var line = document.createElement('div'); line.className = 'log-line';
    var ts = document.createElement('span'); ts.className = 'log-ts';
    ts.textContent = entry.ts ? String(entry.ts).slice(11, 19) : '';
    var lvl = document.createElement('span'); lvl.className = 'log-ch ch-ml';
    lvl.textContent = '[' + (entry.level || 'INFO') + ']';
    var msg = document.createElement('span');
    var lvlLower = String(entry.level || '').toLowerCase();
    if (lvlLower === 'error' || lvlLower === 'warning') msg.className = 'lm-warn';
    msg.textContent = entry.msg || '';
    line.appendChild(ts); line.appendChild(lvl); line.appendChild(msg);
    box.appendChild(line);
  });
  box.scrollTop = box.scrollHeight;
}

function _loadModelCards() {
  var api = _getAPI();
  if (!api || !api.get_model_cards) return;
  api.get_model_cards().then(function(raw) {
    try {
      var d = JSON.parse(raw) || {};
      _renderPerModelCards(d.cards || []);
      _applyTrainingControls(d.training_states, d.data_ready);
      _applyMlResources(d.process_resources);
    } catch(e) { console.warn('[botik] model_cards parse error', e); }
  }).catch(function(e) { console.warn('[botik] model_cards error', e); });
}

function _applyMlResources(res) {
  if (!res) return;
  var scopes = res.scopes || {};
  function _setResource(scope, ramId, cpuId) {
    var info = scopes[scope] || {};
    var ramEl = document.getElementById(ramId);
    var cpuEl = document.getElementById(cpuId);
    if (ramEl) ramEl.textContent = info.ram_mb !== null && info.ram_mb !== undefined ? info.ram_mb + ' MB' : '\u2014';
    if (cpuEl) cpuEl.textContent = 'CPU: ' + (info.cpu_pct !== null && info.cpu_pct !== undefined ? info.cpu_pct + '%' : '\u2014');
  }
  _setResource('futures', 'ml-ram-futures', 'ml-cpu-futures');
  _setResource('spot',    'ml-ram-spot',    'ml-cpu-spot');
  var gpuEl  = document.getElementById('ml-gpu-pct');
  var gpuMem = document.getElementById('ml-gpu-mem');
  if (gpuEl)  gpuEl.textContent  = res.gpu_pct  !== null && res.gpu_pct  !== undefined ? res.gpu_pct  + '%' : '\u2014';
  if (gpuMem) gpuMem.textContent = 'VRAM: ' + (res.gpu_mem_mb !== null && res.gpu_mem_mb !== undefined ? Math.round(res.gpu_mem_mb) + ' MB' : '\u2014');
}

function _loadMlLogs(scope) {
  var api = _getAPI();
  if (!api || !api.get_model_logs) return;
  api.get_model_logs(scope || _activeMlLogScope).then(function(raw) {
    try { _renderMlLogs((JSON.parse(raw) || {}).logs || []); }
    catch(e) { console.warn('[botik] ml_logs parse error', e); }

}

function _applyTrainingControls(trainingStates, dataReady) {
  ['futures', 'spot'].forEach(function(scope) {
    var state   = String((trainingStates || {})[scope] || 'stopped').toLowerCase();
    var hasData = Boolean((dataReady || {})[scope]);
    var running = state === 'running';

    var tag = document.getElementById('train-' + scope + '-state-tag');
    if (tag) {
      tag.className = 'tag ' + (running ? 'tag-loading' : 'tag-idle');
      tag.textContent = state.toUpperCase();
    }
    var startBtn = document.getElementById('train-' + scope + '-start-btn');
    if (startBtn) startBtn.disabled = !hasData || running;
    var stopBtn = document.getElementById('train-' + scope + '-stop-btn');
    if (stopBtn) stopBtn.disabled = !running;
    var hint = document.getElementById('train-' + scope + '-data-hint');
    if (hint) {
      _clearEl(hint);
      if (!hasData) {
        hint.appendChild(document.createTextNode('Нет данных — '));
        var lnk = document.createElement('button');
        lnk.className = 'btn btn-ghost';
        lnk.textContent = '→ Данные';
        lnk.style.cssText = 'padding:2px 8px;font-size:10px;height:auto;line-height:1.4';
        lnk.onclick = function() { _navigateToPage('data'); };
        hint.appendChild(lnk);
      } else if (running) {
        hint.textContent = 'Обучение запущено…';
      }
    }
  });
}

function _initAPI() {
  if (_apiInitDone) return;

    _apiInitDone = true;

}

// Polling fallback — fires if event never comes (common in frozen/exe mode)
(function _waitAPI(attempt) {
  if (_apiInitDone) return;
  _initAPI();
  if (!_apiInitDone && attempt < 50) setTimeout(function(){ _waitAPI(attempt+1); }, 200);
})(0);

function _onServerEvent(type, data) {
  if (type === 'log_entry') {

}

function _applyPipeline(p) {
  if (!p) return;

  var futReady    = p.data_futures_ready || 0;
  var spotReady   = p.data_spot_ready    || 0;
  var totalData   = p.data_total         || 0;
  var bfState     = p.backfill_state     || 'stopped';
  var ldState     = p.livedata_state     || 'stopped';
  var isCollecting = (bfState === 'running' || ldState === 'running');

  // Step 1: Data counts
  var futEl  = document.getElementById('pl-data-fut');
  var spotEl = document.getElementById('pl-data-spot');
  if (futEl)  futEl.textContent  = futReady  > 0 ? futReady  + ' символов готово' : 'Нет данных';
  if (spotEl) spotEl.textContent = spotReady > 0 ? spotReady + ' символов готово' : 'Нет данных';
  if (futEl)  futEl.style.color  = futReady  > 0 ? 'var(--green)' : 'var(--yellow)';
  if (spotEl) spotEl.style.color = spotReady > 0 ? 'var(--green)' : 'var(--yellow)';

  // Step 1: Backfill indicator
  var badge  = document.getElementById('pl-backfill-badge');
  var info   = document.getElementById('pl-backfill-info');
  var detail = document.getElementById('pl-backfill-detail');
  var stopBtn = document.getElementById('pl-btn-stop-backfill');
  var card   = document.getElementById('pl-step1-card');
  if (isCollecting) {
    if (badge)  { badge.style.display = ''; }
    if (info)   { info.style.display  = ''; }
    if (detail) {
      var who = bfState === 'running' ? 'backfill' : 'livedata';
      detail = document.getElementById('pl-backfill-detail');
      detail.textContent = who === 'backfill'
        ? 'Идёт загрузка исторических свечей (' + totalData + ' символов)…'
        : 'Идёт получение live-данных…';
    }
    if (stopBtn) { stopBtn.style.display = ''; }
    if (card)   { card.style.borderLeft = '2px solid var(--yellow)'; }
  } else {
    if (badge)  { badge.style.display  = 'none'; }
    if (info)   { info.style.display   = 'none'; }
    if (stopBtn){ stopBtn.style.display = 'none'; }
    if (card)   { card.style.borderLeft = ''; }
  }

  // Nav badge on "Данные"
  var navBadge = document.getElementById('nav-data-badge');
  if (navBadge) { navBadge.style.display = isCollecting ? '' : 'none'; }

  // Step 2: Models
  var stateMap = {
    'trained':    ['var(--green)',  'Обучена'],
    'training':   ['var(--yellow)', 'Обучается…'],
    'checkpoint': ['var(--yellow)', 'Checkpoint'],
    'missing':    ['var(--red)',    'Не обучена'],
  };
  function _applyModelEl(elId, state, btnId, hasData) {
    var el  = document.getElementById(elId);
    var btn = document.getElementById(btnId);
    var info2 = stateMap[state] || ['var(--text3)', state];
    if (el)  { el.textContent = info2[1]; el.style.color = info2[0]; }
    if (btn) {
      var canTrain = hasData && state !== 'training';
      btn.disabled = !canTrain;
      btn.textContent = state === 'training' ? '⟳' : '▶ ' + (btnId === 'pl-btn-fut' ? 'Futures' : 'Spot');
    }
  }
  _applyModelEl('pl-model-fut',  p.models_futures || 'missing', 'pl-btn-fut',  futReady  > 0);
  _applyModelEl('pl-model-spot', p.models_spot    || 'missing', 'pl-btn-spot', spotReady > 0);

  // Step 3: Trade state (from running_modes already applied elsewhere)
}

  var modes    = runningModes || [];
  var spotRunning = modes.some(function(m) { return m === 'spot_spread' || m === 'spot_spike'; });

/* ─── HOME HOLDINGS (SPOT + FUTURES COMBINED) ─────────── */
function _loadHomeHoldings() {
  var api = _getAPI();
  if (!api) return;
  var spotRows = [];
  var futRows  = [];
  var pending  = 2;
  function _tryRender() {
    if (--pending > 0) return;
    _buildHomeHoldingsTable(spotRows, futRows);
  }
  api.get_spot_positions().then(function(raw) {
    try { spotRows = JSON.parse(raw) || []; } catch(e) {}
    _tryRender();
  }).catch(function() { _tryRender(); });
  api.get_futures_positions().then(function(raw) {
    try { futRows = JSON.parse(raw) || []; } catch(e) {}
    _tryRender();
  }).catch(function() { _tryRender(); });
}

function _buildHomeHoldingsTable(spotRows, futRows) {
  var tbl = document.getElementById('holdings-table');
  if (!tbl) return;
  _clearEl(tbl);
  var headers = ['Символ', 'Тип', 'Кол-во / Размер', 'Цена входа', 'uPnL', 'Статус'];
  var rows = [];
  spotRows.forEach(function(r) {
    var pnl    = r.unrealized_pnl;
    var pnlCls = (pnl === null || pnl === undefined) ? '' : (Number(pnl) >= 0 ? 'col-green' : 'col-red');
    rows.push([
      {text: r.symbol || '\u2014', cls: 'col-blue'},
      {text: 'SPOT', tag: 'tag-idle'},
      {text: r.free_qty !== undefined && r.free_qty !== null ? Number(r.free_qty).toFixed(6) : '\u2014'},
      {text: r.avg_entry_price !== undefined && r.avg_entry_price !== null ? Number(r.avg_entry_price).toFixed(4) : '\u2014'},
      {text: (pnl === null || pnl === undefined) ? '\u2014' : _fmtSignedNumber(pnl, 4), cls: pnlCls},
      {text: String(r.hold_reason || 'HOLD').toUpperCase(), tag: 'tag-active'}
    ]);
  });
  futRows.forEach(function(r) {
    var pnl    = r.unrealised_pnl !== undefined ? r.unrealised_pnl : r.unrealized_pnl;
    var pnlCls = (pnl === null || pnl === undefined) ? '' : (Number(pnl) >= 0 ? 'col-green' : 'col-red');
    var side   = String(r.side || '').toUpperCase();
    rows.push([
      {text: r.symbol || '\u2014', cls: 'col-blue'},
      {text: 'FUT', tag: 'tag-loading'},
      {text: r.size !== undefined && r.size !== null ? String(r.size) : '\u2014'},
      {text: r.entry_price !== undefined && r.entry_price !== null ? Number(r.entry_price).toFixed(4) : '\u2014'},
      {text: (pnl === null || pnl === undefined) ? '\u2014' : _fmtSignedNumber(pnl, 4), cls: pnlCls},
      {text: side || 'OPEN', tag: side === 'BUY' ? 'tag-active' : (side === 'SELL' ? 'tag-risk' : 'tag-idle')}
    ]);
  });
  if (!rows.length) {
    var tbody = document.createElement('tbody');
    var tr = document.createElement('tr');
    var td = document.createElement('td');
    td.colSpan = headers.length;
    td.style.cssText = 'text-align:center;color:var(--text3);padding:24px;font-size:13px';
    td.textContent = 'Нет активных холдингов';
    tr.appendChild(td);
    tbody.appendChild(tr);
    tbl.appendChild(tbody);
    return;
  }
  buildTable(tbl, headers, rows);
}

function _pollSnapshot() {
  var api = _getAPI();
  if (!api) return;
  api.get_snapshot().then(function(raw) {
    try {
      _applySnapshot(JSON.parse(raw));
      var activePage = _activePageKey();
      if (activePage === 'home')      _loadHomeHoldings();
      if (activePage === 'spot')      _loadSpotPageData();
      if (activePage === 'futures')   _loadFuturesPositions();
      if (activePage === 'models')    _loadModelsData();
      if (activePage === 'ops')       _loadOpsPage();
      if (activePage === 'data')      _loadDataPage();
      if (activePage === 'analytics') _loadAnalytics();
    } catch(e) { console.warn('[botik] parse error', e); }
  }).catch(function(e) { console.warn('[botik] snapshot error', e); });
  setTimeout(_pollSnapshot, 2000);
}

    if (pnl !== null) {
      _pnlDemoActive = false;
      pnlEl.textContent = (pnl >= 0 ? '+' : '') + '$' + pnl.toFixed(2);
      pnlEl.className = 'metric-value ' + (pnl >= 0 ? 'green' : 'red');
    } else {
      pnlEl.textContent = '\u2014';
      pnlEl.className = 'metric-value plain';
    }

  var balSub = document.getElementById('balance-sub');

  if (balEl)  balEl.textContent  = balHasValue ? _fmt(d.balance_total, 2) : '\u2014';
  if (balSub) balSub.textContent = balHasValue ? 'Spot wallet' : 'Paper / API не настроен';

  var tradesEl = document.getElementById('trades-val');
  if (tradesEl) tradesEl.textContent = d.trades_today !== undefined ? d.trades_today : '\u2014';
  var tradesSub = document.getElementById('trades-sub');
  if (tradesSub && d.win_rate !== null && d.win_rate !== undefined)
    tradesSub.textContent = '\u2191 WR ' + d.win_rate + '%';

  var spotC = d.spot_open_count;
  var futC = d.futures_open_count;
  var posEl = document.getElementById('open-pos-val');
  if (posEl) posEl.textContent = (typeof spotC === 'number' && typeof futC === 'number') ? (spotC + futC) : '\u2014';
  var posSub = document.getElementById('open-pos-sub');
  if (posSub) posSub.textContent = 'Spot: ' + (spotC !== undefined ? spotC : '\u2014') + ' \u00B7 Fut: ' + (futC !== undefined ? futC : '\u2014');

  var spotPnl = typeof d.spot_unrealized_pnl === 'number' ? d.spot_unrealized_pnl : null;
  var spotPnlEl = document.getElementById('spot-pnl-val');
  if (spotPnlEl) {
    if (spotPnl === null) {
      spotPnlEl.textContent = '\u2014';
      spotPnlEl.className = 'metric-value plain';
    } else {
      spotPnlEl.textContent = (spotPnl >= 0 ? '+' : '') + '$' + spotPnl.toFixed(2);
      spotPnlEl.className = 'metric-value ' + (spotPnl > 0 ? 'green' : (spotPnl < 0 ? 'red' : 'plain'));

    var mt = d.ml_training;

    var attentionCount = d.futures_attention_count;
    if (protectedCount !== undefined || attentionCount !== undefined) {
      futPosSub.textContent =

        ' \u00B7 attention: ' + (attentionCount !== undefined ? attentionCount : '\u2014');

      futPosSub.textContent = 'Linear USDT · ожидание данных';

  var futuresPnl = typeof d.futures_unrealised_pnl === 'number' ? d.futures_unrealised_pnl : null;
  var futuresPnlEl = document.getElementById('futures-pnl-val');

  }

  if (d.pnl_chart && d.pnl_chart.length) _rebuildChart(d.pnl_chart);
  if (d.diag_rows) _applyDiagRows(d.diag_rows);
  if (d.pipeline)  _applyPipeline(d.pipeline);

  // Spot/Futures trade controls
  var modes = d.running_modes || [];
  _applyPipelineTrade(modes);
  var spotRunning = modes.some(function(m) { return m === 'spot_spread' || m === 'spot_spike'; });
  var futRunning  = modes.some(function(m) { return m === 'futures_spike_reversal'; });

  var spotTag = document.getElementById('spot-trade-tag');
  if (spotTag) { spotTag.textContent = spotRunning ? 'RUNNING' : 'STOPPED'; spotTag.className = 'tag ' + (spotRunning ? 'tag-active' : 'tag-idle'); }
  var futTag  = document.getElementById('fut-trade-tag');
  if (futTag)  { futTag.textContent  = futRunning  ? 'RUNNING' : 'STOPPED'; futTag.className  = 'tag ' + (futRunning  ? 'tag-active' : 'tag-idle'); }

  var btnSpotStart = document.getElementById('btn-spot-start');
  var btnSpotStop  = document.getElementById('btn-spot-stop');
  if (btnSpotStart) btnSpotStart.disabled = spotRunning;
  if (btnSpotStop)  btnSpotStop.disabled  = !spotRunning;
  var btnFutStart  = document.getElementById('btn-fut-start');
  var btnFutStop   = document.getElementById('btn-fut-stop');
  if (btnFutStart) btnFutStart.disabled = futRunning;
  if (btnFutStop)  btnFutStop.disabled  = !futRunning;

  var btnTrainStart = document.getElementById('btn-train-start');
  if (btnTrainStart) btnTrainStart.style.display = (mlState === 'running') ? 'none' : '';
  var btnTrainStop = document.getElementById('btn-train-stop');
  if (btnTrainStop) btnTrainStop.style.display = (mlState === 'running') ? '' : 'none';

function _rebuildChart(vals) {
  var el = document.getElementById('pnl-chart');
  if (!el) return;
  _clearEl(el);
  var allZero = vals.every(function(v) { return v === 0; });
  if (allZero) {
    var msg = document.createElement('div');
    msg.style.cssText = 'color:var(--text3);font-size:11px;align-self:center;padding:8px 0';
    msg.textContent = 'Нет сделок';
    el.appendChild(msg);
    return;
  }
  var maxVal = Math.max.apply(null, vals.map(Math.abs)) || 1;
  vals.forEach(function(v, i) {
    var bar = document.createElement('div');
    bar.className = 'chart-bar' + (v >= 0 ? ' bar-green' : '');
    if (v < 0) bar.style.background = 'linear-gradient(to top, var(--red), rgba(255,77,106,0.3))';
    bar.style.height = '4px';
    el.appendChild(bar);
    setTimeout(function() { bar.style.height = Math.round((Math.abs(v)/maxVal)*110) + 'px'; }, 100 + i*80);
  });
}

function _applyDiagRows(rows) {
  var card = document.getElementById('diag-card');
  if (!card) return;
  var title = card.querySelector('.section-title');
  _clearEl(card);
  if (title) card.appendChild(title);
  rows.forEach(function(row) {
    var r = document.createElement('div'); r.className = 'status-row';
    var k = document.createElement('span'); k.className = 'status-key'; k.textContent = row.key;
    var v = document.createElement('span'); v.className = 'status-val ' + (row.state || ''); v.textContent = row.val;
    r.appendChild(k); r.appendChild(v); card.appendChild(r);
  });
}

function _loadDataPage() {
  var api = _getAPI(); if (!api) return;
  api.get_data_status().then(function(raw) {
    try { _applyDataStatus(JSON.parse(raw)); } catch(e) { console.warn('[botik] data parse', e); }
  });
  _refreshDataMiniLog();
}

function _refreshDataMiniLog() {
  var api = _getAPI(); if (!api) return;
  api.get_logs(300).then(function(raw) {
    try {
      var logs = typeof raw === 'string' ? JSON.parse(raw) : raw;
      var lines = logs.filter(function(e) {
        return e.ch === 'data'
          || (e.msg && (
              e.msg.indexOf('[backfill]') !== -1
              || e.msg.indexOf('[livedata]') !== -1
              || e.msg.indexOf('BackfillWorker') !== -1
              || e.msg.indexOf('backfill_worker') !== -1
              || e.msg.indexOf('[data]') !== -1
          ));
      });
      var box = document.getElementById('data-mini-log');
      if (!box) return;
      while (box.firstChild) box.removeChild(box.firstChild);
      if (!lines.length) {
        var ph = document.createElement('span');
        ph.style.color = 'var(--text3)';
        ph.textContent = 'Нет активности. Запустите Backfill для начала сбора данных.';
        box.appendChild(ph);
        return;
      }
      var last = lines.slice(-60);
      last.forEach(function(e) {
        var row = document.createElement('div');
        var m = e.msg || '';
        var col = 'var(--text2)';
        if (m.indexOf('FAILED') !== -1 || m.indexOf('ERROR') !== -1) col = 'var(--red)';
        else if (m.indexOf('+') !== -1 && m.indexOf('candles') !== -1) col = 'var(--green)';
        else if (m.indexOf('starting') !== -1 || m.indexOf('finished') !== -1) col = 'var(--yellow)';
        else if (m.indexOf('[data]') !== -1) col = 'var(--teal)';
        row.style.color = col;
        var ts = document.createElement('span');
        ts.style.color = 'var(--text3)';
        ts.style.marginRight = '6px';
        ts.textContent = e.ts || '';
        row.appendChild(ts);
        var txt = document.createTextNode(m);
        row.appendChild(txt);
        box.appendChild(row);
      });
      box.scrollTop = box.scrollHeight;
    } catch(e2) { console.warn('[botik] mini-log parse', e2); }
  });
}

function _applyDataStatus(d) {
  var summary  = d.summary  || {};
  var symbols  = d.symbols  || [];
  var bfState  = d.backfill_state  || 'stopped';
  var ldState  = d.livedata_state  || 'stopped';
  var lin      = summary['linear'] || {};
  var spot     = summary['spot']   || {};

  // ── Summary cards ──
  var linEl = document.getElementById('data-linear-val');
  if (linEl) linEl.textContent = lin.total ? (lin.ready || 0) + ' / ' + lin.total : '\u2014';
  var linSub = document.getElementById('data-linear-sub');
  if (linSub) linSub.textContent = lin.total ? 'ready / total \u00b7 ws=' + (lin.ws_active || 0) : '\u043d\u0435\u0442 \u0441\u0438\u043c\u0432\u043e\u043b\u043e\u0432';

  var spotEl = document.getElementById('data-spot-val');
  if (spotEl) spotEl.textContent = spot.total ? (spot.ready || 0) + ' / ' + spot.total : '\u2014';
  var spotSub = document.getElementById('data-spot-sub');
  if (spotSub) spotSub.textContent = spot.total ? 'ready / total \u00b7 ws=' + (spot.ws_active || 0) : '\u043d\u0435\u0442 \u0441\u0438\u043c\u0432\u043e\u043b\u043e\u0432';

  var wsTotal = (lin.ws_active || 0) + (spot.ws_active || 0);
  var wsEl = document.getElementById('data-ws-val');
  if (wsEl) { wsEl.textContent = wsTotal; wsEl.style.color = wsTotal > 0 ? 'var(--green)' : 'var(--text3)'; }

  var totalCandles = (lin.total_candles || 0) + (spot.total_candles || 0);
  var cndEl = document.getElementById('data-candles-val');
  if (cndEl) cndEl.textContent = totalCandles > 0 ? Number(totalCandles).toLocaleString('ru-RU') : '\u2014';

  // ── Progress bars ──
  var linReady  = lin.ready  || 0;  var linTotal  = lin.total  || 0;
  var spotReady = spot.ready || 0;  var spotTotal = spot.total || 0;
  var futPct  = linTotal  > 0 ? Math.round(linReady  / linTotal  * 100) : 0;
  var spotPct = spotTotal > 0 ? Math.round(spotReady / spotTotal * 100) : 0;
  var futBar = document.getElementById('data-prog-fut-bar');
  var futTxt = document.getElementById('data-prog-fut-txt');
  if (futBar)  futBar.style.width = futPct + '%';
  if (futTxt)  futTxt.textContent = linTotal  > 0 ? linReady  + ' / ' + linTotal  + ' (' + futPct  + '%)' : '\u2014';
  var spotBar = document.getElementById('data-prog-spot-bar');
  var spotTxt = document.getElementById('data-prog-spot-txt');
  if (spotBar) spotBar.style.width = spotPct + '%';
  if (spotTxt) spotTxt.textContent = spotTotal > 0 ? spotReady + ' / ' + spotTotal + ' (' + spotPct + '%)' : '\u2014';

  // ── Progress badges ──
  var bfBadge   = document.getElementById('data-bf-badge');
  var ldBadge   = document.getElementById('data-ld-badge');
  var doneBadge = document.getElementById('data-done-badge');
  if (bfBadge)   bfBadge.style.display   = bfState === 'running' ? '' : 'none';
  if (ldBadge)   ldBadge.style.display   = ldState === 'running' ? '' : 'none';
  var allDone = linTotal > 0 && linReady >= linTotal && spotTotal > 0 && spotReady >= spotTotal;
  if (doneBadge) doneBadge.style.display = allDone && bfState !== 'running' && ldState !== 'running' ? '' : 'none';

  // ── Current symbol (backfill_progress from DB) ──
  var bp  = d.backfill_progress || {};
  var curRow = document.getElementById('data-current-symbol-row');
  var curSym = document.getElementById('data-cur-symbol');
  var curCat = document.getElementById('data-cur-category');
  var curIv  = document.getElementById('data-cur-interval');
  var curCnt = document.getElementById('data-cur-cnt');
  if (curRow) {
    var showCur = bfState === 'running' && bp.symbol && !bp.done;
    curRow.style.display = showCur ? '' : 'none';
    if (showCur) {
      if (curSym) curSym.textContent = bp.symbol || '—';
      if (curCat) curCat.textContent = bp.category || '—';
      if (curIv)  curIv.textContent  = bp.interval ? bp.interval + 'm' : '—';
      if (curCnt) curCnt.textContent = bp.total ? (bp.processed + 1) + ' / ' + bp.total + ' симв.' : '';
    }
  }

  // ── Button states ──
  var bfStart = document.getElementById('btn-backfill-start');
  var bfStop  = document.getElementById('btn-backfill-stop');
  if (bfStart) bfStart.style.display = bfState === 'running' ? 'none' : '';
  if (bfStop)  bfStop.style.display  = bfState === 'running' ? ''     : 'none';

  var ldStart = document.getElementById('btn-live-start');
  var ldStop  = document.getElementById('btn-live-stop');
  if (ldStart) ldStart.style.display = ldState === 'running' ? 'none' : '';
  if (ldStop)  ldStop.style.display  = ldState === 'running' ? ''     : 'none';

  var msg = document.getElementById('data-status-msg');
  if (msg) {
    var parts = [];
    if (bfState === 'running') parts.push('backfill: running');
    if (ldState === 'running') parts.push('live: running');
    msg.textContent = parts.join(' \u00b7 ');
    msg.style.color = parts.length ? 'var(--green)' : 'var(--text3)';
  }

  // ── Storage paths ──
  var stor = d.storage || {};
  var storCard = document.getElementById('data-storage-card');
  if (storCard && stor.db_path) {
    storCard.style.display = '';
    var dbPathEl = document.getElementById('data-db-path');
    var dbSizeEl = document.getElementById('data-db-size');
    var exePathEl = document.getElementById('data-exe-path');
    var exeBtnEl  = document.getElementById('btn-open-exe-folder');
    if (dbPathEl) dbPathEl.textContent = stor.db_path;
    if (dbSizeEl) dbSizeEl.textContent = stor.db_size_mb != null ? stor.db_size_mb + ' MB' : '—';
    if (exePathEl) exePathEl.textContent = stor.exe_path || 'не найден';
    if (exeBtnEl) exeBtnEl.style.display = stor.exe_path ? '' : 'none';
  }

  // ── Symbol table ──
  var empty = document.getElementById('data-empty-state');
  var tbl   = document.getElementById('data-table');
  if (!tbl) return;
  if (!symbols.length) {
    if (empty) empty.style.display = '';
    tbl.style.display = 'none';
    return;
  }
  if (empty) empty.style.display = 'none';
  tbl.style.display = '';
  _clearEl(tbl);

  var thead = tbl.createTHead();
  var hrow  = thead.insertRow();
  ['Символ','Категория','TF','Свечей','Статус','WS','Обновлено'].forEach(function(h) {
    var th = document.createElement('th'); th.textContent = h; hrow.appendChild(th);
  });

  var tbody = tbl.createTBody();
  symbols.forEach(function(s) {
    var tr  = tbody.insertRow();
    var stColor = s.data_status === 'ready' ? 'var(--green)' :
                  s.data_status === 'partial' ? 'var(--yellow)' : 'var(--text3)';

    var tdSym = tr.insertCell(); tdSym.style.fontFamily = "'JetBrains Mono',monospace"; tdSym.style.fontSize = '12px';
    tdSym.textContent = s.symbol;

    var tdCat = tr.insertCell(); tdCat.style.color = 'var(--text3)'; tdCat.style.fontSize = '11px';
    tdCat.textContent = s.category;

    var tdTf = tr.insertCell(); tdTf.style.fontFamily = "'JetBrains Mono',monospace"; tdTf.style.fontSize = '11px';
    tdTf.textContent = s.interval + 'm';

    var tdCnt = tr.insertCell(); tdCnt.style.fontFamily = "'JetBrains Mono',monospace";
    tdCnt.textContent = Number(s.candle_count).toLocaleString('ru-RU');

    var tdSt = tr.insertCell();
    var stSpan = document.createElement('span');
    stSpan.style.color = stColor; stSpan.style.fontSize = '11px'; stSpan.style.fontWeight = '600';
    stSpan.textContent = s.data_status || '\u2014';
    tdSt.appendChild(stSpan);

    var tdWs = tr.insertCell();
    var wsSpan = document.createElement('span');
    wsSpan.style.color = s.ws_active ? 'var(--green)' : 'var(--text3)';
    wsSpan.textContent = s.ws_active ? '\u25cf' : '\u25cb';
    tdWs.appendChild(wsSpan);

    var tdUpd = tr.insertCell(); tdUpd.style.color = 'var(--text3)'; tdUpd.style.fontSize = '11px';
    tdUpd.textContent = s.updated_at ? s.updated_at.replace('T',' ').replace('Z','') : '\u2014';
  });
}

function _escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

/**
 * Загружает страницу бэктестинга: заполняет список символов, сбрасывает результаты.
 * Вызывается при навигации на страницу "backtest".
 */
function _loadBacktestPage() {
  _btHideAll();
  apiGetBacktestSymbols();
}

/**
 * Запрашивает у Python список активных символов и заполняет select#bt-symbol.
 */
function apiGetBacktestSymbols() {
  var api = _getAPI();
  if (!api) return;
  api.get_backtest_symbols().then(function(symbols) {
    var sel = document.getElementById('bt-symbol');
    if (!sel) return;
    var current = sel.value;
    sel.innerHTML = '';
    var list = Array.isArray(symbols) ? symbols : ['BTCUSDT','ETHUSDT','SOLUSDT','XRPUSDT','BNBUSDT'];
    list.forEach(function(s) {
      var opt = document.createElement('option');
      opt.value = s;
      opt.textContent = s;
      if (s === current) opt.selected = true;
      sel.appendChild(opt);
    });
    if (!sel.value && list.length) sel.value = list[0];
  }).catch(function(e) {
    console.warn('[backtest] get_backtest_symbols error', e);
  });
}

/**
 * Вызывает Python run_backtest, возвращает Promise.
 */
function apiRunBacktest(scope, symbol, interval, days_back) {
  var api = _getAPI();
  if (!api) return Promise.reject('API not ready');
  return api.run_backtest(scope, symbol, interval, days_back);
}

/**
 * Запускает бэктест по текущим значениям формы.
 */
function _runBacktest() {
  var scope    = (document.getElementById('bt-scope')    || {}).value || 'futures';
  var symbol   = (document.getElementById('bt-symbol')   || {}).value || 'BTCUSDT';
  var interval = (document.getElementById('bt-interval') || {}).value || '15';
  var days     = parseInt((document.getElementById('bt-days') || {}).value || '30', 10);

  _btHideAll();
  var spinner = document.getElementById('bt-spinner');
  var btn     = document.getElementById('bt-run-btn');
  if (spinner) spinner.style.display = '';
  if (btn)     { btn.disabled = true; btn.style.opacity = '0.6'; }

  apiRunBacktest(scope, symbol, interval, days).then(function(data) {
    if (spinner) spinner.style.display = 'none';
    if (btn)     { btn.disabled = false; btn.style.opacity = '1'; }
    if (data && data.error) {
      _btShowError(data.error);
    } else {
      _renderBacktestResult(data);
    }
  }).catch(function(e) {
    if (spinner) spinner.style.display = 'none';
    if (btn)     { btn.disabled = false; btn.style.opacity = '1'; }
    _btShowError(String(e));
  });
}

/**
 * Рендерит результаты бэктеста: метрики + таблица сделок.
 * @param {Object} data — BacktestResult.to_dict()
 */
function _renderBacktestResult(data) {
  if (!data) { _btShowError('Нет данных'); return; }

  function _txt(id, val) {
    var el = document.getElementById(id);
    if (el) el.textContent = (val !== undefined && val !== null) ? String(val) : '—';
  }
  function _col(id, v) {
    var el = document.getElementById(id);
    if (!el) return;
    var n = parseFloat(v);
    el.style.color = isNaN(n) ? '' : (n > 0 ? 'var(--green)' : n < 0 ? 'var(--red)' : '');
  }
  function _fmtN(v, dec) {
    var n = parseFloat(v);
    return isNaN(n) ? '—' : n.toFixed(dec !== undefined ? dec : 2);
  }
  function _fmtPct(v) {
    var n = parseFloat(v);
    return isNaN(n) ? '—' : _fmtN(n, 1) + '%';
  }

  _txt('bt-m-trades',  data.trades || 0);
  _txt('bt-m-winrate', _fmtPct(data.win_rate));
  _txt('bt-m-pnl',     _fmtN(data.total_pnl) + ' USDT');
  _col('bt-m-pnl',     data.total_pnl);
  _txt('bt-m-drawdown', _fmtN(data.max_drawdown) + ' (' + _fmtPct(data.max_drawdown_pct) + ')');
  _txt('bt-m-sharpe',  _fmtN(data.sharpe_ratio, 3));
  _txt('bt-m-avgwin',  _fmtN(data.avg_win) + ' USDT');
  _txt('bt-m-avgloss', _fmtN(data.avg_loss) + ' USDT');
  _txt('bt-m-pf',      _fmtN(data.profit_factor, 3));

  // Мета-строка
  var meta = [
    data.symbol || '',
    (data.scope || '').toUpperCase(),
    'interval ' + (data.interval || ''),
    (data.start_date || '').slice(0, 10) + ' → ' + (data.end_date || '').slice(0, 10),
    (data.total_candles || 0) + ' свечей',
    (data.wins || 0) + 'W / ' + (data.losses || 0) + 'L',
  ].filter(Boolean).join('  ·  ');
  _txt('bt-meta-row', meta);

  // Таблица сделок
  var trades = Array.isArray(data.trades_list) ? data.trades_list.slice(-50) : [];
  var tbody  = document.getElementById('bt-trades-tbody');
  var empty  = document.getElementById('bt-trades-empty');
  var table  = document.getElementById('bt-trades-table');

  if (tbody) tbody.textContent = '';
  if (trades.length === 0) {
    if (empty) empty.style.display = '';
    if (table) table.style.display = 'none';
  } else {
    if (empty) empty.style.display = 'none';
    if (table) table.style.display = '';
    trades.forEach(function(t) {
      var pnl     = parseFloat(t.pnl);
      var pnlClr  = isNaN(pnl) ? '' : (pnl > 0 ? 'var(--green)' : pnl < 0 ? 'var(--red)' : '');
      var side    = String(t.side || '').toLowerCase();
      var sideClr = side === 'long' ? 'var(--green)' : side === 'short' ? 'var(--red)' : 'var(--text2)';

      function _cell(val, style) {
        var td = document.createElement('td');
        td.textContent = val !== undefined && val !== null ? String(val) : '—';
        if (style) td.setAttribute('style', style);
        return td;
      }

      var tr = document.createElement('tr');
      tr.appendChild(_cell(String(t.open_time  || '').slice(0,16),
        "color:var(--text3);font-family:'JetBrains Mono',monospace;font-size:11px"));
      tr.appendChild(_cell(String(t.close_time || '').slice(0,16),
        "color:var(--text3);font-family:'JetBrains Mono',monospace;font-size:11px"));
      tr.appendChild(_cell(String(t.symbol || data.symbol || '')));
      tr.appendChild(_cell(String(t.side || '').toUpperCase(),
        'color:' + sideClr + ';font-weight:600'));
      tr.appendChild(_cell(_fmtN(t.entry, 4),
        "font-family:'JetBrains Mono',monospace"));
      tr.appendChild(_cell(_fmtN(t.exit, 4),
        "font-family:'JetBrains Mono',monospace"));
      tr.appendChild(_cell((pnl > 0 ? '+' : '') + _fmtN(pnl),
        'color:' + pnlClr + ";font-weight:600;font-family:'JetBrains Mono',monospace"));
      tr.appendChild(_cell(String(t.reason || ''), 'color:var(--text3);font-size:11px'));
      if (tbody) tbody.appendChild(tr);
    });
  }

  var results = document.getElementById('bt-results');
  if (results) results.style.display = '';
}

  }

    todayEl.textContent = 'Сегодня ' + tsign + d.today_pnl.toFixed(2);
  }
  var wrEl = document.getElementById('an-win-rate');

  var tcEl = document.getElementById('an-trade-count');
  if (tcEl) tcEl.textContent = d.trade_count + ' сделок';
  var ddEl = document.getElementById('an-drawdown');
  if (ddEl) ddEl.textContent = d.max_drawdown.toFixed(2) + ' USDT';
  var avgEl = document.getElementById('an-avg-pnl');
  if (avgEl) avgEl.textContent = 'Avg ' + (d.avg_pnl >= 0 ? '+' : '') + d.avg_pnl.toFixed(2);
  var bwEl = document.getElementById('an-best-worst');
  if (bwEl) bwEl.textContent = '+' + d.best_trade.toFixed(2) + ' / ' + d.worst_trade.toFixed(2);
  var splitEl = document.getElementById('an-scope-split');
  if (splitEl) {
    var parts = Object.keys(d.by_scope).map(function(sc) {
      return sc + ': ' + d.by_scope[sc].trade_count;
    });
    splitEl.textContent = parts.join(' · ') || '—';
  }

  // ── equity curve ──
  var canvas  = document.getElementById('an-equity-canvas');
