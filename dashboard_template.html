    if (emptyEl) emptyEl.style.display = '';
    if (canvas)  canvas.style.display  = 'none';
  }

  // ── by scope ──
  _renderByScope(d.by_scope);

  // ── recent trades ──
  _renderRecentTrades(d.recent_trades);
}

function _renderByScope(byScope) {
  var bsEl = document.getElementById('an-by-scope');
  if (!bsEl) return;
  while (bsEl.firstChild) bsEl.removeChild(bsEl.firstChild);
  var keys = Object.keys(byScope || {});
  if (!keys.length) {
    var emp = document.createElement('div');
    emp.style.cssText = 'color:var(--text3);font-size:13px';
    emp.textContent = 'Нет данных';
    bsEl.appendChild(emp);
    return;
  }
  keys.forEach(function(sc) {
    var s     = byScope[sc];
    var label = sc === 'futures' ? 'Фьючерсы' : sc === 'spot' ? 'Спот' : sc;
    var sign  = s.total_pnl >= 0 ? '+' : '';
    var block = document.createElement('div');
    block.style.marginBottom = '12px';

    var title = document.createElement('div');
    title.style.cssText = 'font-size:11px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px';
    title.textContent = label;
    block.appendChild(title);

    var grid = document.createElement('div');
    grid.style.cssText = 'display:grid;grid-template-columns:1fr 1fr;gap:4px';

    var cells = [
      ['PnL',     sign + s.total_pnl.toFixed(2), s.total_pnl >= 0 ? 'green' : 'red'],
      ['Win Rate',(s.win_rate*100).toFixed(1)+'%','blue'],
      ['Сделок',  String(s.trade_count), ''],
      ['Avg PnL', (s.avg_pnl>=0?'+':'') + s.avg_pnl.toFixed(2), ''],
    ];
    cells.forEach(function(cell) {
      var item  = document.createElement('div');
      item.className = 'mini-stat';
      var lbl   = document.createElement('span');
      lbl.textContent = cell[0];
      var val   = document.createElement('b');
      if (cell[2]) val.className = cell[2];
      val.textContent = cell[1];
      item.appendChild(lbl);
      item.appendChild(val);
      grid.appendChild(item);
    });
    block.appendChild(grid);
    bsEl.appendChild(block);
  });
}

function _renderRecentTrades(trades) {
  var tbody    = document.getElementById('an-trades-tbody');
  var tbl      = document.getElementById('an-trades-table');
  var tblEmpty = document.getElementById('an-trades-empty');
  if (!tbody) return;
  if (!trades || !trades.length) {
    if (tbl)      tbl.style.display      = 'none';
    if (tblEmpty) tblEmpty.style.display = '';
    return;
  }
  if (tbl)      tbl.style.display      = '';
  if (tblEmpty) tblEmpty.style.display = 'none';
  while (tbody.firstChild) tbody.removeChild(tbody.firstChild);
  trades.forEach(function(t) {
    var pnlSign   = t.pnl >= 0 ? '+' : '';
    var pnlClass  = t.pnl >= 0 ? 'green' : 'red';
    var scopeLabel= t.scope === 'futures' ? 'Фьют' : t.scope === 'spot' ? 'Спот' : t.scope;
    var tr = document.createElement('tr');

    var tdSym   = document.createElement('td');
    tdSym.textContent = t.symbol;

    var tdScope = document.createElement('td');
    var badge   = document.createElement('span');
    badge.className   = 'badge';
    badge.textContent = scopeLabel;
    tdScope.appendChild(badge);

    var tdPnl   = document.createElement('td');
    tdPnl.className   = pnlClass;
    tdPnl.textContent = pnlSign + t.pnl.toFixed(2);

    var tdDate  = document.createElement('td');
    tdDate.className  = 'muted';
    tdDate.textContent= t.closed_at;

    tr.appendChild(tdSym);
    tr.appendChild(tdScope);
    tr.appendChild(tdPnl);
    tr.appendChild(tdDate);
    tbody.appendChild(tr);
  });
}

function _drawEquityCurve(canvas, curve) {
  var dpr = window.devicePixelRatio || 1;
  var W   = canvas.offsetWidth  || 600;
  var H   = canvas.offsetHeight || 200;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  var ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  var vals = curve.map(function(p) { return p.cumulative_pnl; });
  var minV = Math.min.apply(null, vals);
  var maxV = Math.max.apply(null, vals);
  if (minV === maxV) { maxV = minV + 1; }

  var pad = { t: 16, r: 16, b: 28, l: 52 };
  var cW  = W - pad.l - pad.r;
  var cH  = H - pad.t - pad.b;

  function xPos(i) { return pad.l + (i / (vals.length - 1 || 1)) * cW; }
  function yPos(v) { return pad.t + (1 - (v - minV) / (maxV - minV)) * cH; }

  // zero line
  if (minV < 0 && maxV > 0) {
    var yz = yPos(0);
    ctx.beginPath(); ctx.strokeStyle = 'rgba(255,255,255,0.12)'; ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]); ctx.moveTo(pad.l, yz); ctx.lineTo(pad.l + cW, yz); ctx.stroke();
    ctx.setLineDash([]);
  }

  // gradient fill
  var lastVal   = vals[vals.length - 1];
  var fillColor = lastVal >= 0 ? '61,201,120' : '255,80,80';
  var grad      = ctx.createLinearGradient(0, pad.t, 0, pad.t + cH);
  grad.addColorStop(0, 'rgba(' + fillColor + ',0.25)');
  grad.addColorStop(1, 'rgba(' + fillColor + ',0.02)');
  ctx.beginPath();
  ctx.moveTo(xPos(0), yPos(vals[0]));
  for (var i = 1; i < vals.length; i++) ctx.lineTo(xPos(i), yPos(vals[i]));
  ctx.lineTo(xPos(vals.length - 1), pad.t + cH);
  ctx.lineTo(xPos(0), pad.t + cH);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // line
  ctx.beginPath();
  ctx.strokeStyle = lastVal >= 0 ? '#3dc978' : '#ff5050';
  ctx.lineWidth   = 2;
  ctx.lineJoin    = 'round';
  ctx.moveTo(xPos(0), yPos(vals[0]));
  for (var j = 1; j < vals.length; j++) ctx.lineTo(xPos(j), yPos(vals[j]));
  ctx.stroke();

  // Y axis labels (3 ticks)
  ctx.fillStyle = 'rgba(160,170,190,0.7)';
  ctx.font      = '10px JetBrains Mono, monospace';
  ctx.textAlign = 'right';
  [minV, (minV + maxV) / 2, maxV].forEach(function(v) {
    ctx.fillText((v >= 0 ? '+' : '') + v.toFixed(1), pad.l - 4, yPos(v) + 3.5);
  });

  // X axis: first and last date
  ctx.textAlign = 'left';
  ctx.fillText(curve[0].date.slice(5), pad.l, H - 6);
  ctx.textAlign = 'right';
  ctx.fillText(curve[curve.length - 1].date.slice(5), pad.l + cW, H - 6);
}

/* ─── LOG POLLING ────────────────────────────────────────── */
var _logActiveChannel = 'sys';

// subtab switching for logs
(function() {
  document.addEventListener('DOMContentLoaded', function() { _initLogSubtabs(); });
  if (document.readyState !== 'loading') { setTimeout(_initLogSubtabs, 0); }
})();

function _initLogSubtabs() {
  var tabs = document.querySelectorAll('#log-subtabs .subtab');
  tabs.forEach(function(tab) {
    tab.addEventListener('click', function() {
      tabs.forEach(function(t) { t.classList.remove('active'); });
      this.classList.add('active');
      var ch = this.getAttribute('data-log-ch');
      _logActiveChannel = ch;
      ['sys','spot','futures','ml','telegram'].forEach(function(c) {
        var el = document.getElementById('log-ch-' + c);
        if (el) el.style.display = c === ch ? '' : 'none';
      });
    });
  });
}

function _pollLogs() {
  var api = _getAPI();
  if (!api) return;
  api.get_logs(300).then(function(raw) {
    try { _appendLogs(JSON.parse(raw)); } catch(e) {}
  });
  setTimeout(_pollLogs, 2500);
}

function _appendLogs(logs) {
  if (!logs.length) return;
  var newLogs = logs.slice(_logSeenCount);
  if (!newLogs.length) return;
  _logSeenCount = logs.length;
  var chMap = {spot:'ch-spot', futures:'ch-futures', ml:'ch-ml', telegram:'ch-telegram', sys:'ch-sys'};
  var cssChMap = {spot:'ch-spot', futures:'ch-futures', ml:'ch-ml', telegram:'ch-ml', sys:'ch-sys'};
  newLogs.forEach(function(l) {
    var targetId = 'log-ch-' + (l.ch || 'sys');
    var container = document.getElementById(targetId) || document.getElementById('log-ch-sys');
    var line = document.createElement('div'); line.className = 'log-line';
    var ts = document.createElement('span'); ts.className = 'log-ts'; ts.textContent = l.ts;
    var ch = document.createElement('span');
    ch.className = 'log-ch ' + (cssChMap[l.ch] || 'ch-sys');
    ch.textContent = '[' + (l.ch || 'sys') + ']';
    var msg = document.createElement('span'); msg.className = _logMsgClass(l.msg); msg.textContent = l.msg;
    line.appendChild(ts); line.appendChild(ch); line.appendChild(msg);
    container.appendChild(line);
    // auto-scroll active channel
    if ((l.ch || 'sys') === _logActiveChannel) {
      container.scrollTop = container.scrollHeight;
    }
  });
}

function logsClearActive() {
  var el = document.getElementById('log-ch-' + _logActiveChannel);
  if (el) _clearEl(el);
}

function logsScrollBottom() {
  var el = document.getElementById('log-ch-' + _logActiveChannel);
  if (el) el.scrollTop = el.scrollHeight;
}

function _logMsgClass(msg) {
  if (!msg) return 'lm-norm';
  var m = msg.toLowerCase();
  if (m.includes('error') || m.includes('exception')) return 'lm-err';
  if (m.includes('warn')) return 'lm-warn';
  if (m.includes(' ok') || m.includes('success') || m.includes('started') || m.includes('filled')) return 'lm-ok';
  return 'lm-norm';
}

function _fmtSignedNumber(value, digits) {
  if (value === null || value === undefined || value === '') return '\u2014';
  var num = Number(value);
  if (!isFinite(num)) return '\u2014';
  return (num > 0 ? '+' : '') + num.toFixed(digits);
}

function _fmtTimeText(value) {
  var raw = String(value || '').trim();
  if (!raw) return '\u2014';
  if (raw.indexOf('T') >= 0) return raw.replace('T', ' ').slice(0, 19);
  return raw.slice(0, 19);
}

function _futuresProtectionTag(status) {
  var normalized = String(status || '').trim().toLowerCase();
  if (normalized === 'protected') return 'tag-active';
  if (normalized === 'pending' || normalized === 'repairing') return 'tag-loading';
  if (normalized === 'failed' || normalized === 'unprotected') return 'tag-risk';
  return 'tag-loading';
}

function _spotOrderStatusTag(status) {
  var normalized = String(status || '').trim().toLowerCase();
  if (normalized === 'filled') return 'tag-active';
  if (normalized === 'new' || normalized === 'open' || normalized === 'partiallyfilled' || normalized === 'partially_filled') return 'tag-loading';
  if (normalized === 'cancelled' || normalized === 'rejected' || normalized === 'failed') return 'tag-risk';
  return 'tag-idle';
}

    return [
      {text: sym, cls: 'col-blue'},
      {text: side || '\u2014', cls: side === 'BUY' ? 'col-green' : (side === 'SELL' ? 'col-red' : '')},
      {text: r.size !== undefined && r.size !== null ? Number(r.size).toFixed(4) : '\u2014'},
      {text: r.entry_price !== undefined && r.entry_price !== null ? Number(r.entry_price).toFixed(4) : '\u2014'},
      {text: r.mark_price !== undefined && r.mark_price !== null ? Number(r.mark_price).toFixed(4) : '\u2014'},
      {text: r.liq_price !== undefined && r.liq_price !== null ? Number(r.liq_price).toFixed(4) : '\u2014'},
      {text: _fmtSignedNumber(r.unrealised_pnl, 4), cls: Number(r.unrealised_pnl || 0) >= 0 ? 'col-green' : 'col-red'},
      {text: protection, tag: _futuresProtectionTag(protection)},
      {text: _fmtTimeText(r.updated_at_utc), cls: 'col-dim'},
      {html: actBtn}
    ];
  }));
}

function _loadSpotPageData() {
  var api = _getAPI();
  if (!api) return;
  var empty = document.getElementById('spot-empty-state');
  if (_spotActiveView === 'orders') {
    api.get_spot_orders().then(function(r) {
      try { _applySpotOrdersTable(JSON.parse(r)); } catch(e) {}
    }).catch(function(e) {
      if (empty) empty.textContent = 'Не удалось загрузить spot-ордера';
      console.warn('[botik] spot orders error', e);
    });
    return;
  }
  if (_spotActiveView === 'history') {
    api.get_spot_fills().then(function(r) {
      try { _applySpotFillsTable(JSON.parse(r)); } catch(e) {}
    }).catch(function(e) {
      if (empty) empty.textContent = 'Не удалось загрузить историю spot fills';
      console.warn('[botik] spot fills error', e);
    });
    return;
  }
  api.get_spot_positions().then(function(r) {
    try { _applySpotPositionsTable(JSON.parse(r)); } catch(e) {}
  }).catch(function(e) {
    if (empty) empty.textContent = 'Не удалось загрузить spot-позиции';
    console.warn('[botik] spot positions error', e);
  });
}

function _loadFuturesPositions() {
  var api = _getAPI();
  var empty = document.getElementById('futures-empty-state');
  if (!api) {
    if (empty) empty.textContent = 'API недоступен';
    return;
  }
  api.get_futures_positions().then(function(r) {
    try { _applyFuturesTable(JSON.parse(r)); } catch(e) { console.warn('[botik] futures parse error', e); }
  }).catch(function(e) {
    if (empty) empty.textContent = 'Не удалось загрузить futures-позиции';
    console.warn('[botik] futures positions error', e);
  });
}

/* ─── OPS / СОСТОЯНИЕ СИСТЕМЫ ────────────────────────────── */
function _loadOpsPage() {
  var api = _getAPI();
  if (!api) return;
  api.get_system_status().then(function(raw) {
    try { _applyOpsPage(JSON.parse(raw)); }
    catch(e) { console.warn('[botik] ops parse error', e); }
  }).catch(function(e) { console.warn('[botik] ops error', e); });
}

function _applyOpsPage(d) {
  // ── Процессы ──────────────────────────────────────────────
  var pc = document.getElementById('ops-processes');
  if (pc && d.processes) {
    pc.innerHTML = '';
    d.processes.forEach(function(p) {
      var running = p.state === 'running';
      var errored = p.state === 'error';
      var dotCls  = running ? 'green' : (errored ? 'red' : 'yellow');
      var stateColor = running ? 'var(--green)' : (errored ? 'var(--red)' : 'var(--yellow)');
      var cardCls = running ? 'card card-glow-green' : (errored ? 'card' : 'card');
      var pidText = p.pid ? 'PID ' + p.pid : 'не запущен';
      pc.innerHTML +=
        '<div class="' + cardCls + '">' +
          '<div class="metric-label">' + p.label + '</div>' +
          '<div style="display:flex;align-items:center;gap:8px;margin-top:6px">' +
            '<div class="dot ' + dotCls + '" style="' + (errored ? 'background:var(--red)' : '') + '"></div>' +
            '<div style="font-family:\'JetBrains Mono\',monospace;font-size:14px;color:' + stateColor + '">' +
              p.state.toUpperCase() +
            '</div>' +
          '</div>' +
          '<div style="font-size:11px;color:var(--text3);margin-top:4px">' + pidText + '</div>' +
        '</div>';
    });
  }

  // ── RAM / CPU / DB-ping ───────────────────────────────────
  var ramBar  = document.getElementById('ops-ram-bar');
  var ramText = document.getElementById('ops-ram-text');
  if (ramBar && d.ram_percent != null) {
    ramBar.style.width = d.ram_percent + '%';
    ramBar.style.background = d.ram_percent > 85 ? 'var(--red)' : 'var(--accent)';
  }
  if (ramText && d.ram_used_mb != null) {
    ramText.textContent = d.ram_used_mb + ' MB / ' + d.ram_total_mb + ' MB  (' + d.ram_percent + '%)';
  }
  var cpuBar  = document.getElementById('ops-cpu-bar');
  var cpuText = document.getElementById('ops-cpu-text');
  if (cpuBar && d.cpu_percent != null) {
    cpuBar.style.width = d.cpu_percent + '%';
    cpuBar.style.background = d.cpu_percent > 80 ? 'var(--red)' : 'var(--accent)';
  }
  if (cpuText && d.cpu_percent != null) {
    cpuText.textContent = d.cpu_percent.toFixed(1) + '%';
  }
  var pingEl = document.getElementById('ops-db-ping');
  if (pingEl) {
    if (d.db_ping_ms != null) {
      pingEl.textContent = d.db_ping_ms + ' ms';
      pingEl.style.color = d.db_ping_ms < 5 ? 'var(--green)' : (d.db_ping_ms < 20 ? 'var(--yellow)' : 'var(--red)');
    } else {
      pingEl.textContent = 'ERR';
      pingEl.style.color = 'var(--red)';
    }
  }

  // ── ENV статус ────────────────────────────────────────────
  var env = d.env_status || {};
  _opsEnvDot('ops-env-api-dot', 'ops-env-api-text', env.has_api_key, 'Задан', 'Не задан');
  _opsEnvDot('ops-env-tg-dot',  'ops-env-tg-text',  env.has_telegram,'Задан', 'Не задан');

  var ut = document.getElementById('ops-uptime');
  if (ut) ut.textContent = d.uptime || '—';
  var vr = document.getElementById('ops-version');
  if (vr) vr.textContent = (d.version || '') + ' · Python ' + (d.python || '') + ' · ' + (d.os || '');

  // ── Диагностика ───────────────────────────────────────────
  var dt = document.getElementById('ops-diag-table');
  if (dt && d.diag_rows) {
    dt.innerHTML = '';
    d.diag_rows.forEach(function(row) {
      var color = row.state === 'ok' ? 'var(--green)' : 'var(--yellow)';
      dt.innerHTML +=
        '<tr>' +
          '<td style="padding:4px 8px 4px 0;color:var(--text3);font-size:12px;white-space:nowrap">' + _fmt_str(row.key) + '</td>' +
          '<td style="padding:4px 0;font-size:12px;color:' + color + ';font-family:\'JetBrains Mono\',monospace">' + _fmt_str(row.val) + '</td>' +
        '</tr>';
    });
  }

  // ── Статистика БД ─────────────────────────────────────────
  var dbt = document.getElementById('ops-db-table');
  if (dbt && d.db_stats) {
    dbt.innerHTML = '';
    d.db_stats.forEach(function(row) {
      var cnt = row.count < 0 ? '—' : row.count.toLocaleString('ru-RU');
      var color = row.count > 0 ? 'var(--text)' : 'var(--text3)';
      dbt.innerHTML +=
        '<tr>' +
          '<td style="padding:4px 8px 4px 0;color:var(--text3);font-size:12px">' + _fmt_str(row.label) + '</td>' +
          '<td style="padding:4px 0;font-size:12px;color:' + color + ';font-family:\'JetBrains Mono\',monospace;text-align:right">' + cnt + '</td>' +
        '</tr>';
    });
  }

  // ── Последние ошибки ──────────────────────────────────────
  var erEl = document.getElementById('ops-errors');
  if (erEl) {
    if (!d.recent_errors || d.recent_errors.length === 0) {
      erEl.innerHTML = '<span style="color:var(--green)">Ошибок нет</span>';
    } else {
      erEl.innerHTML = d.recent_errors.map(function(e) {
        var lvlColor = e.level === 'ERROR' ? 'var(--red)' : 'var(--yellow)';
        return '<div style="padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.04)">' +
          '<span style="color:var(--text3);margin-right:6px">' + (e.ts || '').slice(0, 16) + '</span>' +
          '<span style="color:' + lvlColor + ';margin-right:6px">[' + (e.channel || '') + ']</span>' +
          '<span>' + _fmt_str(e.message || '') + '</span>' +
        '</div>';
      }).join('');
    }
  }
}

function _opsEnvDot(dotId, textId, ok, yesLabel, noLabel) {
  var dot = document.getElementById(dotId);
  var txt = document.getElementById(textId);
  if (dot) { dot.className = 'dot ' + (ok ? 'green' : 'yellow'); }
  if (txt) { txt.textContent = ok ? yesLabel : noLabel; txt.style.color = ok ? 'var(--green)' : 'var(--yellow)'; }
}

function _fmt_str(v) {
  if (v === null || v === undefined) return '—';
  return String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

document.querySelectorAll('.nav-item').forEach(function(item) {
  item.addEventListener('click', function() {
    var page = this.getAttribute('data-page');
    if (page === 'home')     { _loadHomeHoldings(); }
    if (page === 'spot')     { _loadSpotPageData(); }
    if (page === 'futures')  { _loadFuturesPositions(); }
    if (page === 'models')   { _loadModelsData(); }
    if (page === 'ops')      { _loadOpsPage(); }
    if (page === 'settings') { settingsLoad(); }
    if (page === 'backtest')   { _loadBacktestPage(); }

});

});

/* ─── SETTINGS ───────────────────────────────────────────── */
function settingsToggleShow(inputId, btn) {
  var inp = document.getElementById(inputId);
  if (!inp) return;
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? '👁' : '🙈';
}

function settingsLoad() {
  var api = _getAPI();
  var btn = document.getElementById('btn-settings-load');
  if (!api) {
    _settingsShowErr('API не готов — попробуйте через секунду');
    return;
  }
  if (btn) { btn.disabled = true; btn.textContent = '⟳ Загрузка…'; }
  api.load_settings().then(function(raw) {
    if (btn) { btn.disabled = false; btn.textContent = '↺ Загрузить'; }
    var d;
    try { d = JSON.parse(raw); } catch(e) { _settingsShowErr('Ошибка разбора ответа'); return; }
    if (!d.ok) { _settingsShowErr(d.error || 'Ошибка загрузки'); return; }
    var v = d.values || {};

    function _set(id, val) {
      var el = document.getElementById(id);
      if (el && val !== undefined) el.value = val;
    }
    function _setStatus(id, val, label) {
      var el = document.getElementById(id);
      if (!el) return;
      el.innerHTML = val
        ? '<span style="color:var(--green)">✓ ' + label + ' задан</span>'
        : '<span style="color:var(--yellow)">⚠ ' + label + ' не задан</span>';
    }

    _set('s-bybit-key',            v.BYBIT_API_KEY            || '');
    _set('s-bybit-secret',         v.BYBIT_API_SECRET_KEY     || '');
    _set('s-bybit-mainnet-key',    v.BYBIT_MAINNET_API_KEY    || '');
    _set('s-bybit-mainnet-secret', v.BYBIT_MAINNET_API_SECRET || '');
    _set('s-tg-token',             v.TELEGRAM_BOT_TOKEN       || '');
    _set('s-tg-chatid',            v.TELEGRAM_CHAT_ID         || '');
    _set('s-db-url',               v.DB_URL                   || '');
    // Strategy — futures
    _set('s-fut-balance',       v.FUTURES_BALANCE        || '');
    _set('s-fut-risk-pct',      v.FUTURES_RISK_PCT       || '');
    _set('s-fut-atr-sl',        v.FUTURES_ATR_SL_MULT    || '');
    _set('s-fut-atr-tp',        v.FUTURES_ATR_TP_MULT    || '');
    _set('s-fut-max-pos-pct',   v.FUTURES_MAX_POS_PCT    || '');
    _set('s-fut-timeout-h',     v.FUTURES_HOLD_TIMEOUT_H || '');
    _set('s-fut-spike-bps',     v.FUTURES_SPIKE_BPS      || '');
    _set('s-fut-max-positions', v.FUTURES_MAX_POSITIONS  || '');
    _set('s-fut-symbols',       v.FUTURES_SYMBOLS        || '');
    // Strategy — spot
    _set('s-spot-balance',      v.SPOT_BALANCE           || '');
    _set('s-spot-risk-pct',     v.SPOT_RISK_PCT          || '');
    _set('s-spot-atr-sl',       v.SPOT_ATR_SL_MULT       || '');
    _set('s-spot-atr-tp',       v.SPOT_ATR_TP_MULT       || '');
    _set('s-spot-max-pos-pct',  v.SPOT_MAX_POS_PCT       || '');
    _set('s-spot-timeout-h',    v.SPOT_HOLD_TIMEOUT_H    || '');
    _set('s-spot-spike-bps',    v.SPOT_SPIKE_BPS         || '');
    _set('s-spot-symbols',      v.SPOT_SYMBOLS           || '');

    _setStatus('s-bybit-key-status',    v.BYBIT_API_KEY,         'Demo API Key');
    _setStatus('s-bybit-mainnet-status',v.BYBIT_MAINNET_API_KEY, 'MainNet API Key');
    _setStatus('s-tg-status',           v.TELEGRAM_BOT_TOKEN,    'Bot Token');
    _setStatus('s-db-status',           v.DB_URL,                 'DB_URL');

    // Show .env path hint
    var pathEl = document.getElementById('settings-env-path');
    if (pathEl && d.env_path) pathEl.textContent = 'Файл: ' + d.env_path;

    // Hide error banner if visible
    var errBanner = document.getElementById('settings-err-banner');
    if (errBanner) errBanner.style.display = 'none';
  }).catch(function(e) {
    if (btn) { btn.disabled = false; btn.textContent = '↺ Загрузить'; }
    _settingsShowErr(String(e));
  });
}

function settingsSave() {
  var api = _getAPI();
  var btn = document.getElementById('btn-settings-save');
  if (!api) { _settingsShowErr('API не готов — попробуйте через секунду'); return; }

  function _val(id) { var el = document.getElementById(id); return el ? el.value.trim() : ''; }
  var data = {
    BYBIT_API_KEY:           _val('s-bybit-key'),
    BYBIT_API_SECRET_KEY:    _val('s-bybit-secret'),
    BYBIT_MAINNET_API_KEY:   _val('s-bybit-mainnet-key'),
    BYBIT_MAINNET_API_SECRET:_val('s-bybit-mainnet-secret'),
    TELEGRAM_BOT_TOKEN:      _val('s-tg-token'),
    TELEGRAM_CHAT_ID:        _val('s-tg-chatid'),
    DB_URL:                  _val('s-db-url'),
    // Strategy — futures
    FUTURES_BALANCE:         _val('s-fut-balance'),
    FUTURES_RISK_PCT:        _val('s-fut-risk-pct'),
    FUTURES_ATR_SL_MULT:     _val('s-fut-atr-sl'),
    FUTURES_ATR_TP_MULT:     _val('s-fut-atr-tp'),
    FUTURES_MAX_POS_PCT:     _val('s-fut-max-pos-pct'),
    FUTURES_HOLD_TIMEOUT_H:  _val('s-fut-timeout-h'),
    FUTURES_SPIKE_BPS:       _val('s-fut-spike-bps'),
    FUTURES_MAX_POSITIONS:   _val('s-fut-max-positions'),
    FUTURES_SYMBOLS:         _val('s-fut-symbols'),
    // Strategy — spot
    SPOT_BALANCE:            _val('s-spot-balance'),
    SPOT_RISK_PCT:           _val('s-spot-risk-pct'),
    SPOT_ATR_SL_MULT:        _val('s-spot-atr-sl'),
    SPOT_ATR_TP_MULT:        _val('s-spot-atr-tp'),
    SPOT_MAX_POS_PCT:        _val('s-spot-max-pos-pct'),
    SPOT_HOLD_TIMEOUT_H:     _val('s-spot-timeout-h'),
    SPOT_SPIKE_BPS:          _val('s-spot-spike-bps'),
    SPOT_SYMBOLS:            _val('s-spot-symbols'),
  };

  if (btn) { btn.disabled = true; btn.textContent = '⟳ Сохранение…'; }
  var errBanner = document.getElementById('settings-err-banner');
  if (errBanner) errBanner.style.display = 'none';

  api.save_settings(data).then(function(raw) {
    if (btn) { btn.disabled = false; btn.textContent = '💾 Сохранить'; }
    var res;
    try { res = JSON.parse(raw); } catch(e) { _settingsShowErr('Ошибка разбора ответа'); return; }
    if (res.ok) {
      var banner = document.getElementById('settings-saved-banner');
      if (banner) { banner.style.display = 'block'; setTimeout(function(){ banner.style.display='none'; }, 4000); }
      // Refresh status indicators
      settingsLoad();
    } else {
      _settingsShowErr(res.error || 'Ошибка сохранения');
    }
  }).catch(function(e) {
    if (btn) { btn.disabled = false; btn.textContent = '💾 Сохранить'; }
    _settingsShowErr(String(e));
  });
}

function _settingsShowErr(msg) {
  var el = document.getElementById('settings-err-banner');
  if (el) { el.textContent = '✕ ' + msg; el.style.display = 'block'; }
}
/* ─── MODEL DETAIL OVERLAY ──────────────────────────────── */
var _currentModelsPayload = null;

function _showModelDetail(card, allRuns) {
  var overlay = document.getElementById('model-detail-overlay');
  var box = document.getElementById('model-detail-box');
  if (!overlay || !box) return;
  var runs = (allRuns || []).filter(function(r) { return (r.scope || r.model_scope) === card.scope; });
  var winRate = null;
  if (runs.length > 0) {
    var wins = runs.filter(function(r) { return parseFloat(r.accuracy||r.f1_score||0) > 0.5; }).length;
    winRate = Math.round(wins / runs.length * 100);
  }
  box.innerHTML =
    '<button onclick="document.getElementById(\'model-detail-overlay\').classList.remove(\'open\')" '
    + 'style="position:absolute;top:12px;right:14px;background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px">✕</button>'
    + '<div style="font-size:18px;font-weight:700;margin-bottom:12px">Модель — ' + (card.scope_label || card.scope) + '</div>'
    + '<div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px">'
    + _detailStat('Статус', card.tag_text || '—', '')
    + _detailStat('Режим', (card.training_mode||'—').toUpperCase(), '')
    + _detailStat('Checkpoint', card.checkpoint_name || '—', '')
    + _detailStat('Win rate (runs)', winRate !== null ? winRate + '%' : '—', winRate !== null && winRate >= 50 ? 'color:var(--green)' : '')
    + '</div>'
    + '<div style="font-size:13px;font-weight:600;margin-bottom:8px;color:var(--text2)">История обучений (' + runs.length + ')</div>'
    + (runs.length === 0
        ? '<div style="color:var(--text3);font-size:12px">Нет истории для этого scope</div>'
        : '<table style="width:100%;border-collapse:collapse;font-size:12px;font-family:\'JetBrains Mono\',monospace">'
          + '<thead><tr style="color:var(--text3)"><th style="text-align:left;padding:4px 6px">Время</th><th style="text-align:left;padding:4px 6px">Режим</th><th style="text-align:left;padding:4px 6px">Версия</th><th style="text-align:left;padding:4px 6px">Accuracy</th><th style="text-align:left;padding:4px 6px">Статус</th></tr></thead><tbody>'
          + runs.map(function(r) {
              var acc = r.accuracy || r.f1_score || null;
              var accStr = acc !== null ? (parseFloat(acc)*100).toFixed(1)+'%' : '—';
              var ok = acc !== null && parseFloat(acc) >= 0.5;
              return '<tr style="border-top:1px solid var(--border1)">'
                + '<td style="padding:4px 6px;color:var(--text3)">' + _fmtTimeText(r.finished_at || r.started_at_utc || '') + '</td>'
                + '<td style="padding:4px 6px">' + (r.mode||'—') + '</td>'
                + '<td style="padding:4px 6px">' + (r.version||'—') + '</td>'
                + '<td style="padding:4px 6px;color:' + (ok?'var(--green)':'var(--red)') + '">' + accStr + '</td>'
                + '<td style="padding:4px 6px;color:' + (_statusColor(r.status)) + '">' + (r.status||'—').toUpperCase() + '</td>'
                + '</tr>';
            }).join('')
          + '</tbody></table>');
  overlay.classList.add('open');
}

function _detailStat(label, val, style) {
  return '<div style="background:var(--surface2);border-radius:8px;padding:10px 14px;min-width:100px;' + style + '">'
       + '<div style="font-size:10px;color:var(--text3);margin-bottom:4px">' + label + '</div>'
       + '<div style="font-size:14px;font-weight:600">' + val + '</div>'
       + '</div>';
}

function _statusColor(s) {
  s = (s||'').toLowerCase();
  if (s === 'done' || s === 'ok' || s === 'success') return 'var(--green)';
  if (s === 'error' || s === 'failed') return 'var(--red)';
  return 'var(--text2)';
}
</script>
