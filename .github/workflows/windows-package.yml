name: windows-package

on:
  workflow_dispatch:
  push:
    branches: [ master, main ]
    paths:
      - "src/**"
      - "dashboard_template.html"
      - "dashboard_preview.html"
      - "dashboard_workspace_manifest.yaml"
      - "dashboard_release_manifest.yaml"
      - "active_models.yaml"
      - "botik.spec"
      - "installer.iss"
      - "requirements.txt"
      - "build_portable_exe.bat"
      - "build_windows_installer.bat"
      - "tools/bump_version.py"
      - ".env.example"
      - "config.example.yaml"
      - "VERSION"
      - ".github/workflows/windows-package.yml"
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: windows-package-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Auto bump VERSION for branch push
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/')
        shell: pwsh
        run: |
          python tools/bump_version.py
          $raw = Get-Content VERSION -Raw
          $v = ($raw | Select-String "version=(.+)").Matches[0].Groups[1].Value.Trim()
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "ci: bump version to $v [skip ci]"
          git push origin HEAD:${{ github.ref_name }}
          Write-Host "Bumped VERSION to $v"

      - name: Read VERSION
        id: ver
        shell: pwsh
        run: |
          $raw = Get-Content VERSION -Raw
          $v = ($raw | Select-String "version=(.+)").Matches[0].Groups[1].Value.Trim()
          "VERSION=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Building version: $v"
          (git rev-parse HEAD).Trim() | Set-Content -Path version.txt -Encoding utf8

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build EXE
        run: python -m PyInstaller --noconfirm --clean botik.spec

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc /DMyAppVersion="${{ steps.ver.outputs.VERSION }}" installer.iss

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: botik-${{ steps.ver.outputs.VERSION }}-exe
          path: dist/botik.exe

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: botik-${{ steps.ver.outputs.VERSION }}-installer
          path: dist/installer/BotikInstaller.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "Botik v${{ steps.ver.outputs.VERSION }}"
          generate_release_notes: true
          files: |
            dist/botik.exe
            dist/installer/BotikInstaller.exe
