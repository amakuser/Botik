name: desktop-package

on:
  workflow_dispatch:
  push:
    branches: [ master, main ]
    paths:
      - "apps/desktop/**"
      - "frontend/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".env.example"
      - "config.example.yaml"
      - "VERSION"
      - ".github/workflows/windows-package.yml"
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: desktop-package-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: dtolnay/rust-toolchain@stable

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Read VERSION
        id: ver
        shell: pwsh
        run: |
          $raw = Get-Content VERSION -Raw
          $v = ($raw | Select-String "version=(.+)").Matches[0].Groups[1].Value.Trim()
          "VERSION=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Packaging version label: $v"
          (git rev-parse HEAD).Trim() | Set-Content -Path version.txt -Encoding utf8

      - name: Build primary desktop bundles
        run: corepack pnpm --dir ./apps/desktop build

      - name: Locate bundle artifacts
        id: bundles
        shell: pwsh
        run: |
          $msi = Get-ChildItem "apps/desktop/src-tauri/target/release/bundle/msi/*.msi" -ErrorAction Stop |
            Select-Object -First 1 -ExpandProperty FullName
          $nsis = Get-ChildItem "apps/desktop/src-tauri/target/release/bundle/nsis/*-setup.exe" -ErrorAction Stop |
            Select-Object -First 1 -ExpandProperty FullName
          "msi=$msi" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "nsis=$nsis" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "MSI: $msi"
          Write-Host "NSIS: $nsis"

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: botik-desktop-${{ steps.ver.outputs.VERSION }}-msi
          path: ${{ steps.bundles.outputs.msi }}

      - name: Upload NSIS artifact
        uses: actions/upload-artifact@v4
        with:
          name: botik-desktop-${{ steps.ver.outputs.VERSION }}-nsis
          path: ${{ steps.bundles.outputs.nsis }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "Botik Desktop v${{ steps.ver.outputs.VERSION }}"
          generate_release_notes: true
          files: |
            ${{ steps.bundles.outputs.msi }}
            ${{ steps.bundles.outputs.nsis }}
